# CCNA Mindmap

## 1. Networking Fundamentals

### OSI Model & TCP/IP Suite
- рЯУЦ 7 layers: Physical вЖТ Data Link вЖТ Network вЖТ Transport вЖТ Session вЖТ Presentation вЖТ Application
  - PDUs: Bit (L1), Frame (L2), Packet (L3), Segment (L4), Data (L5-7)
  - Encapsulation downward, de-encapsulation upward
  - TCP/IP 4-layer: Network Access, Internet, Transport, Application
- рЯФЧ OSI Layer: ALL layers
- вЪЩпЄП Commands
  - `show ip interface brief` вАФ L3 status
  - `show interfaces <int>` вАФ L1/L2 status, counters
  - `ping <ip>` вАФ L3 reachability (ICMP)
  - `show arp` вАФ L2/L3 ARP table
- рЯФН Verification
  - `show ip protocols` вАФ active routing protocols
- рЯФІ Troubleshooting
  - вЪ†пЄП down/down вЖТ L1 (cable/SFP) вЖТ replace cable
  - вЪ†пЄП up/down вЖТ L2 mismatch вЖТ check encapsulation both ends
  - вЪ†пЄП Ping fails, interface up/up вЖТ L3, no route вЖТ `show ip route`

### Network Devices
- рЯУЦ Roles
  - Router: L3, forwards between networks
  - Switch: L2, forwards within LAN
  - Firewall/NGFW: L3вАУL7, filters traffic with DPI
  - AP: wireless connectivity (L1/L2)
  - WLC / DNA Center: centrally manages APs and SD-Access
  - PoE Switch: powers phones, APs, cameras via Ethernet
- рЯФЧ OSI Layer: Router=L3, Switch=L2, AP=L1/2, Firewall=L3-7
- вЪЩпЄП Commands
  - [IOS/IOS-XE] `interface GigabitEthernet0/0` вЖТ `ip address 192.168.1.1 255.255.255.0` вЖТ `no shutdown`
  - [IOS-XR] `interface GigabitEthernet0/0/0/0` вЖТ `ipv4 address 192.168.1.1/24` вЖТ `no shutdown`
- рЯФН Verification
  - `show ip interface brief` вАФ all interfaces and status
  - `show version` вАФ platform and IOS version
- рЯФІ Troubleshooting
  - вЪ†пЄП Interface admin down вЖТ forgot `no shutdown`
  - вЪ†пЄП Up/up but no traffic вЖТ duplex/speed mismatch вЖТ `show interfaces` вЖТ force settings

### Interfaces & Cables
- рЯУЦ Cable Standards
  - UTP copper: RJ-45, IEEE 802.3, max 100m
  - 10/100BASE-T: 2 pairs | 1000BASE-T/10GBASE-T: 4 pairs bidirectional
  - Auto MDI-X: modern devices auto-detect straight-through vs crossover
  - SMF: laser, up to 80km | MMF: LED, up to 550m, cheaper
- рЯФЧ OSI Layer: Layer 1 (Physical)
- вЪЩпЄП Commands
  - `speed 1000` + `duplex full` on interface
  - `description ## to SW1 ##`
- рЯФН Verification
  - `show interfaces <int>` вАФ speed, duplex, CRC/runts/giants
  - `show interfaces status` (switch)
- рЯФІ Troubleshooting
  - вЪ†пЄП High CRC errors вЖТ bad cable or duplex mismatch вЖТ replace cable or force settings
  - вЪ†пЄП Runts (<64B) вЖТ duplex mismatch вЖТ force `duplex full`
  - вЪ†пЄП Giants (>1518B) вЖТ jumbo frames one-sided вЖТ align MTU both sides

### IPv4 Addressing & Subnetting
- рЯУЦ Key Concepts
  - 32-bit, 4 octets dotted decimal with CIDR prefix
  - Usable hosts = 2^n - 2 (n = host bits)
  - Class A /8 (1вАУ126), Class B /16 (128вАУ191), Class C /24 (192вАУ223)
  - Private (RFC 1918): 10/8, 172.16/12, 192.168/16
  - Network address = all host bits 0 | Broadcast = all host bits 1
  - VLSM: variable-length subnets for efficient addressing
- рЯФЧ OSI Layer: Layer 3 (Network)
- вЪЩпЄП Commands
  - [IOS/IOS-XE] `ip address 192.168.1.1 255.255.255.0`
  - [IOS-XR] `ipv4 address 192.168.1.1/24`
  - Windows: `ipconfig /all` | Linux: `ip addr show`
- рЯФІ Troubleshooting
  - вЪ†пЄП Can't reach gateway вЖТ wrong subnet mask вЖТ reconfigure host
  - вЪ†пЄП 169.254.x.x (APIPA) вЖТ DHCP failure вЖТ `ipconfig /release` + `/renew`

### IPv6 Addressing
- рЯУЦ Address Types
  - 128-bit, 8 groups of 16-bit hex, colon-separated
  - Shorten: remove leading zeros, :: for longest all-zero run (once only), lowercase
  - Global Unicast 2000::/3 (public) | Unique Local FDxx::/48 (private)
  - Link-Local FE80::/10 (auto-generated) | Multicast FF00::/8
  - EUI-64: derive Interface ID from MAC (insert FFFE, flip 7th bit)
  - SLAAC: auto-config via NDP Router Advertisements (NDP replaces ARP)
- рЯФЧ OSI Layer: Layer 3 (Network)
- рЯУЛ Prerequisites: `ipv6 unicast-routing` must be enabled globally
- вЪЩпЄП Commands
  - `ipv6 unicast-routing` (global)
  - `ipv6 address 2001:db8::1/64` on interface
  - EUI-64: `ipv6 address 2001:db8::/64 eui-64`
  - SLAAC: `ipv6 address autoconfig`
- рЯФН Verification
  - `show ipv6 interface brief` | `show ipv6 neighbors` | `show ipv6 route`
- рЯФІ Troubleshooting
  - вЪ†пЄП IPv6 not routing вЖТ `ipv6 unicast-routing` missing
  - вЪ†пЄП Neighbors not forming вЖТ `ipv6 enable` on interface

### TCP vs UDP
- рЯУЦ TCP: connection-oriented, reliable
  - 3-way handshake: SYN вЖТ SYN-ACK вЖТ ACK
  - ACKs, retransmissions, sequencing, flow control
  - Use for: HTTP/S, SSH, FTP, SMTP, BGP
- рЯУЦ UDP: connectionless, best-effort
  - No handshake, lower overhead, faster
  - Use for: DNS, DHCP, TFTP, SNMP, NTP, VoIP
- рЯФЧ OSI Layer: Layer 4 (Transport)
- вЪЩпЄП Key Port Numbers
  - TCP: FTP 20/21, SSH 22, Telnet 23, HTTP 80, HTTPS 443
  - UDP: DNS 53, DHCP 67/68, TFTP 69, SNMP 161/162, Syslog 514, NTP 123
- рЯФІ Troubleshooting
  - вЪ†пЄП App unreachable, ping works вЖТ port blocked by ACL вЖТ `show access-lists`
  - вЪ†пЄП Slow transfer вЖТ TCP window/packet loss вЖТ `show interfaces`

### Wireless Principles
- рЯУЦ Key Concepts
  - 2.4 GHz: better range/penetration, congested, non-overlapping channels: 1, 6, 11
  - 5 GHz: more non-overlapping channels, less congestion, shorter range
  - SSID: human-readable network name | CSMA/CA: collision avoidance
  - WPA2 (CCMP/AES) current | WPA3 (GCMP/AES) latest
- рЯФЧ OSI Layer: L1 (Physical) and L2 (Data Link)
- рЯФІ Troubleshooting
  - вЪ†пЄП Poor signal вЖТ channel overlap вЖТ use analyzer вЖТ change to non-overlapping channel
  - вЪ†пЄП Connects but no internet вЖТ DHCP not reachable вЖТ check VLAN tag on trunk

### Virtualization Fundamentals
- рЯУЦ Types
  - Type 1 Hypervisor (bare-metal): VMware ESXi, Hyper-V вАФ data center
  - Type 2 Hypervisor (hosted): VMware Workstation, VirtualBox вАФ personal
  - Containers (Docker): share host OS kernel, ~ms boot, Kubernetes orchestration
  - VRF: multiple routing tables on one router (Layer 3 segmentation)
- рЯФЧ OSI Layer: L3 for VRF; L1/L2 for virtual switches
- вЪЩпЄП VRF Commands
  - [IOS/IOS-XE] `ip vrf CUST_A` вЖТ interface: `ip vrf forwarding CUST_A` вЖТ `ip address ...`
  - [IOS-XR] `vrf CUST_A` вЖТ interface: `vrf CUST_A` вЖТ `ipv4 address ...`
- рЯФН Verification
  - `show ip vrf` | `show ip route vrf CUST_A` | `ping vrf CUST_A 10.1.1.2`

## 2. Network Access

### VLANs
- рЯУЦ Logically segments a switch into separate broadcast domains
  - VLAN ID range: 1вАУ4094 (normal: 1вАУ1005, extended: 1006вАУ4094)
  - VLAN 1 = default, cannot be deleted
  - Traffic between VLANs requires Layer 3 routing
- рЯФЧ OSI Layer: Layer 2 (Data Link)
- рЯУЛ Prerequisites: Plan VLAN IDs and subnets. VLANs must exist on ALL switches in the path
- вЪЩпЄП Access Port
  - `vlan 10` вЖТ `name SALES`
  - `switchport mode access` вЖТ `switchport access vlan 10`
  - Voice VLAN: `switchport voice vlan 20`
- вЪЩпЄП Trunk Port
  - `switchport trunk encapsulation dot1q` (if needed)
  - `switchport mode trunk` вЖТ `switchport trunk allowed vlan 10,20,30`
  - `switchport trunk native vlan 99`
- рЯФН Verification
  - `show vlan brief` | `show interfaces trunk` | `show interfaces <int> switchport`
- рЯФІ Troubleshooting
  - вЪ†пЄП Host can't reach same-VLAN host вЖТ port not in correct VLAN вЖТ reassign
  - вЪ†пЄП VLAN not crossing trunk вЖТ not in allowed list вЖТ `switchport trunk allowed vlan add <id>`
  - вЪ†пЄП Native VLAN mismatch warning вЖТ `switchport trunk native vlan <id>` on BOTH sides

### Trunking (802.1Q)
- рЯУЦ Carries multiple VLANs over a single link
  - 802.1Q tag (4 bytes): 12-bit VLAN ID, 3-bit PCP (QoS), 1-bit DEI
  - Native VLAN sent untagged вАФ must match both ends
  - ISL: Cisco proprietary, obsolete вАФ use 802.1Q only
  - DTP: auto-negotiates trunks вАФ disable on production (`switchport nonegotiate`)
- рЯФЧ OSI Layer: Layer 2 (Data Link)
- рЯУЛ Prerequisites: VLANs exist both sides. Native VLAN must match. Disable DTP
- вЪЩпЄП Commands
  - `switchport trunk encapsulation dot1q` вЖТ `switchport mode trunk`
  - `switchport trunk native vlan 99` вЖТ `switchport nonegotiate`
- рЯФН Verification
  - `show interfaces trunk` | `show interfaces <int> switchport`
- рЯФІ Troubleshooting
  - вЪ†пЄП Native VLAN mismatch вЖТ align on BOTH sides
  - вЪ†пЄП VLAN not active on trunk вЖТ VLAN not created locally вЖТ `vlan <id>`
  - вЪ†пЄП Trunk not forming вЖТ force both sides `switchport mode trunk`

### Spanning Tree Protocol
- рЯУЦ Prevents L2 loops by blocking redundant ports
  - Root Bridge: lowest Bridge ID (priority + MAC) вАФ all ports Designated/Forwarding
  - Root Port: best path to Root Bridge | Designated: best port per segment
  - STP states: Blocking вЖТ Listening (15s) вЖТ Learning (15s) вЖТ Forwarding
  - RSTP (802.1w): ~1вАУ2s convergence via handshake
  - RSTP roles: Alternate (backup Root Port), Backup (backup Designated Port)
  - STP port cost: 10Gbps=2, 1Gbps=4, 100Mbps=19, 10Mbps=100
- рЯФЧ OSI Layer: Layer 2 (Data Link)
- рЯУЛ Prerequisites: Same STP variant across switches. PortFast ONLY on end-host ports. BPDU Guard on all access ports
- вЪЩпЄП Commands
  - `spanning-tree vlan 10 root primary` (priority=24576)
  - `spanning-tree vlan 10 root secondary` (priority=28672)
  - PortFast: `spanning-tree portfast` (per-port) or `spanning-tree portfast default`
  - BPDU Guard: `spanning-tree bpduguard enable` (per-port) or `spanning-tree portfast bpduguard default`
  - Mode: `spanning-tree mode rapid-pvst`
- рЯФН Verification
  - `show spanning-tree` | `show spanning-tree vlan 10` | `show spanning-tree summary`
- рЯФІ Troubleshooting
  - вЪ†пЄП Broadcast storm вЖТ L2 loop вЖТ `show spanning-tree` вЖТ disable offending port immediately
  - вЪ†пЄП Port stuck in BLK вЖТ wrong Root Bridge вЖТ manually configure correct root
  - вЪ†пЄП PortFast port err-disabled вЖТ switch plugged in (BPDU received) вЖТ unplug вЖТ shutdown/no shutdown

### EtherChannel (LACP)
- рЯУЦ Bundles multiple physical links into one logical interface
  - STP sees as single link вАФ no ports blocked
  - LACP (IEEE 802.3ad): active initiates, passive waits
  - PAgP (Cisco): desirable initiates, auto waits
  - Static `on` mode: both sides must be `on`
  - All member ports must match: speed, duplex, VLAN config
- рЯФЧ OSI Layer: L2 (and L3 for Layer 3 EtherChannel)
- рЯУЛ Prerequisites: Identical config on all members. Mismatch = port suspended (s flag)
- вЪЩпЄП Commands
  - `interface range GigabitEthernet0/0 - 3` вЖТ `channel-group 1 mode active`
  - `interface port-channel 1` вЖТ configure trunk/access/IP
  - [IOS-XR] `interface Bundle-Ether1` вЖТ member: `bundle id 1 mode active`
- рЯФН Verification
  - `show etherchannel summary` вАФ SU=L2 in-use, P=bundled, s=suspended, D=down
  - `show lacp neighbor`
- рЯФІ Troubleshooting
  - вЪ†пЄП Port shows `s` (suspended) вЖТ config mismatch вЖТ `show etherchannel detail` вЖТ align
  - вЪ†пЄП Channel not forming вЖТ both sides passive вЖТ one must be `active`
  - вЪ†пЄП Uneven traffic вЖТ `port-channel load-balance src-dst-ip`

### CDP and LLDP
- рЯУЦ Layer 2 neighbor discovery protocols
  - CDP: Cisco proprietary, ON by default, 60s timer, 180s hold-time
  - LLDP: IEEE 802.1AB, OFF by default on Cisco, 30s timer, 120s hold-time, 2s reinit delay
  - Both reveal: hostname, IP, device type, IOS version, connected port вАФ disable on external ports
- рЯФЧ OSI Layer: Layer 2 (Data Link)
- вЪЩпЄП Commands
  - CDP: `no cdp run` (global) | `no cdp enable` (per-interface)
  - LLDP: `lldp run` (global) | `lldp transmit` AND `lldp receive` (per-interface, both required)
  - [IOS-XR] global `lldp` вЖТ interface: `lldp enable`
- рЯФН Verification
  - `show cdp neighbors detail` | `show lldp neighbors detail`
- рЯФІ Troubleshooting
  - вЪ†пЄП CDP neighbor missing вЖТ CDP disabled one side вЖТ `show cdp interface`
  - вЪ†пЄП LLDP neighbor missing вЖТ tx/rx not both enabled вЖТ add `lldp transmit` + `lldp receive`

### Wireless Architectures
- рЯУЦ AP Deployment Models
  - Autonomous AP: self-contained, individual config, small networks only
  - Lightweight AP (CAPWAP split-MAC)
    - AP handles: RF, encryption, beacons, packet prioritization (real-time)
    - WLC handles: auth, QoS, roaming, channel assignment (non-real-time)
    - CAPWAP tunnels: UDP 5246 control (encrypted), UDP 5247 data
    - AP connects to switch ACCESS port (not trunk)
  - Cloud-based AP (Cisco Meraki): cloud management, local data forwarding
- рЯУЦ WLC Deployment Modes
  - Unified HW appliance: up to 6000 APs
  - Cloud-based VM: up to 3000 APs | Embedded in switch: up to 200 APs
  - Mobility Express (in AP): up to 100 APs
- рЯФЧ OSI Layer: L1/L2 wireless, L3 CAPWAP tunnels
- рЯУЛ Prerequisites: WLC reachable via DHCP Option 43 or DNS. X.509 certs on AP and WLC
- рЯФІ Troubleshooting
  - вЪ†пЄП AP not joining WLC вЖТ CAPWAP failing вЖТ check Option 43 вЖТ `debug capwap client errors`
  - вЪ†пЄП No IP for clients вЖТ DHCP not reaching WLC dynamic interface вЖТ check VLAN mapping

### Port Security
- рЯУЦ Restricts which MACs can send on a switchport
  - Default: 1 MAC, violation mode = shutdown (err-disable)
  - Violation modes: Shutdown (err-disable + log), Restrict (drop + log + count), Protect (drop silently)
  - Sticky: saves dynamically learned MACs permanently to running-config
- рЯФЧ OSI Layer: Layer 2 (Data Link)
- вЪЩпЄП Commands
  - `switchport mode access` вЖТ `switchport port-security`
  - `switchport port-security maximum 2`
  - `switchport port-security mac-address sticky`
  - `switchport port-security violation restrict`
  - Auto-recover: `errdisable recovery cause psecure-violation` вЖТ `errdisable recovery interval 300`
- рЯФН Verification
  - `show port-security interface <int>` | `show port-security address`
- рЯФІ Troubleshooting
  - вЪ†пЄП Port err-disabled вЖТ unauthorized device вЖТ shutdown/no shutdown or errdisable recovery
  - вЪ†пЄП Legit device blocked вЖТ max too low вЖТ increase `switchport port-security maximum`

### DHCP Snooping
- рЯУЦ Filters DHCP messages on untrusted switch ports
  - All ports untrusted by default вАФ mark uplinks as trusted
  - Untrusted: drops DHCP Server msgs (OFFER/ACK/NAK), validates Client CHADDR vs src MAC
  - Builds DHCP Snooping Binding Table (required by DAI)
  - Option 82 added by default вАФ can cause issues in multi-switch deployments
- рЯФЧ OSI Layer: Layer 2 (Data Link)
- рЯУЛ Prerequisites: Enable globally + per-VLAN. Mark uplinks trusted. Enable before DAI
- вЪЩпЄП Commands
  - `ip dhcp snooping` вЖТ `ip dhcp snooping vlan 10,20`
  - Uplink: `ip dhcp snooping trust`
  - Rate-limit: `ip dhcp snooping limit rate 15`
  - Disable Option 82: `no ip dhcp snooping information option`
- рЯФН Verification
  - `show ip dhcp snooping` | `show ip dhcp snooping binding` | `show ip dhcp snooping statistics`
- рЯФІ Troubleshooting
  - вЪ†пЄП Clients not getting DHCP вЖТ uplink not trusted вЖТ `ip dhcp snooping trust`
  - вЪ†пЄП "inconsistent relay info" drops вЖТ Option 82 mismatch вЖТ `no ip dhcp snooping information option`

### Dynamic ARP Inspection (DAI)
- рЯУЦ Validates ARP packets vs DHCP Snooping binding table on untrusted ports
  - Sender MAC вЙ† binding entry вЖТ ARP dropped вАФ prevents ARP poisoning (MitM)
  - Trusted ports forward all ARP normally
  - ARP ACLs for static-IP hosts not in binding table
- рЯФЧ OSI Layer: Layer 2 (Data Link)
- рЯУЛ Prerequisites: DHCP Snooping enabled and binding table populated
- вЪЩпЄП Commands
  - `ip arp inspection vlan 10,20`
  - Uplink: `ip arp inspection trust`
  - Rate-limit: `ip arp inspection limit rate 100`
  - Validate: `ip arp inspection validate src-mac dst-mac ip`
  - ARP ACL: `arp access-list STATIC` вЖТ `permit ip host 10.1.1.10 mac host aabb.cc00.1234` вЖТ apply with `ip arp inspection filter STATIC vlan 10`
- рЯФН Verification
  - `show ip arp inspection` | `show ip arp inspection interfaces`
- рЯФІ Troubleshooting
  - вЪ†пЄП Legit ARP dropped вЖТ static IP host not in snooping table вЖТ create ARP ACL
  - вЪ†пЄП Port err-disabled from ARP rate вЖТ adjust rate or `errdisable recovery cause arp-inspection`

## 3. IP Connectivity

### Routing Table & Forwarding
- рЯУЦ Router forwarding decision order
  - Longest prefix match wins (most specific route)
  - Tie вЖТ lowest Administrative Distance (AD)
  - Tie вЖТ lowest metric (cost/hop count/bandwidth)
  - Default route: 0.0.0.0/0 = Gateway of Last Resort
  - Route codes: C=Connected, L=Local, S=Static, O=OSPF, D=EIGRP, R=RIP
- рЯУЦ Administrative Distance (memorize)
  - Connected=0, Static=1, EIGRP Int=90, OSPF=110, RIP=120, EIGRP Ext=170, Unusable=255
- рЯФЧ OSI Layer: Layer 3 (Network)
- рЯФН Verification
  - `show ip route` | `show ip route 10.1.1.0` | `show ip route summary` | `show ip protocols`
- рЯФІ Troubleshooting
  - вЪ†пЄП Wrong path вЖТ less-specific route winning вЖТ add more-specific route
  - вЪ†пЄП "Destination unreachable" вЖТ no route вЖТ `show ip route` вЖТ add route
  - вЪ†пЄП Route flapping вЖТ neighbor instability вЖТ `debug ip routing`

### Static Routing
- рЯУЦ Manually configured routes вАФ no auto-adaptation to failures
  - Types: Network, Host (/32), Default (0.0.0.0/0), Floating static (backup with higher AD)
  - Recursive: next-hop IP only | Directly-attached: exit interface | Fully-specified: both
  - On Ethernet interfaces: always use next-hop IP (not just exit interface)
- рЯФЧ OSI Layer: Layer 3 (Network)
- рЯУЛ Prerequisites: Exit interface up. Next-hop IP reachable
- вЪЩпЄП Commands
  - Network: `ip route 10.1.0.0 255.255.0.0 192.168.1.2`
  - Default: `ip route 0.0.0.0 0.0.0.0 203.0.113.1`
  - Floating: `ip route 10.1.0.0 255.255.0.0 192.168.2.2 200` (AD=200 > OSPF 110)
  - IPv6: `ipv6 route 2001:db8:1::/64 2001:db8:12::2`
  - [IOS-XR] `router static` вЖТ `address-family ipv4 unicast` вЖТ `10.1.0.0/16 192.168.1.2`
- рЯФН Verification
  - `show ip route static` | `show ip route 10.1.0.0`
- рЯФІ Troubleshooting
  - вЪ†пЄП Static route missing вЖТ next-hop unreachable вЖТ verify next-hop
  - вЪ†пЄП Floating static not activating вЖТ AD too low вЖТ must be higher than primary protocol AD

### OSPF (OSPFv2)
- рЯУЦ Link-State IGP using Dijkstra's SPF algorithm
  - All areas must connect to Area 0 (backbone) | ABR = router in multiple areas (max 2)
  - Cost = reference BW / interface BW (default ref = 100 Mbps вАФ increase for modern networks)
  - Router ID: manual > highest loopback > highest physical IP
  - DR/BDR election on broadcast: highest priority (default=1) вЖТ highest RID
  - Timers: Hello=10s, Dead=40s (Ethernet)
- рЯУЦ Neighbor states: Down вЖТ Init вЖТ 2-Way вЖТ ExStart вЖТ Exchange вЖТ Loading вЖТ Full
- рЯФЧ OSI Layer: L3, IP protocol 89, multicast 224.0.0.5 / 224.0.0.6
- рЯУЛ Prerequisites: Area#, Hello/Dead timers, subnet, MTU, network type, unique RIDs must all match
- вЪЩпЄП Commands [IOS/IOS-XE]
  - `router ospf 1` вЖТ `router-id 1.1.1.1`
  - `auto-cost reference-bandwidth 10000` (10 Gbps reference вАФ set on ALL routers)
  - `network 10.0.0.0 0.0.0.255 area 0`
  - `passive-interface GigabitEthernet0/1`
  - Per-interface: `ip ospf 1 area 0`
  - Manual cost: `ip ospf cost 100` | Prevent DR: `ip ospf priority 0`
- вЪЩпЄП Commands [IOS-XR]
  - `router ospf 1` вЖТ `router-id 1.1.1.1` вЖТ `area 0` вЖТ `interface GigabitEthernet0/0/0/0`
- рЯФН Verification
  - `show ip ospf neighbor` вАФ must reach FULL state
  - `show ip ospf interface brief` вАФ area, cost, DR/BDR
  - `show ip ospf database` | `show ip route ospf`
- рЯФІ Troubleshooting
  - вЪ†пЄП Stuck in INIT вЖТ ACL blocking 224.0.0.5 вЖТ `debug ip ospf hello` вЖТ remove ACL block
  - вЪ†пЄП Stuck in EXSTART/EXCHANGE вЖТ MTU mismatch вЖТ `ip ospf mtu-ignore` or align MTU
  - вЪ†пЄП Neighbors up, routes missing вЖТ network type mismatch вЖТ `ip ospf network <type>`
  - вЪ†пЄП Wrong cost вЖТ `auto-cost reference-bandwidth` not updated вЖТ set on ALL routers

### EIGRP
- рЯУЦ Advanced distance-vector IGP вАФ Cisco, now open standard
  - DUAL algorithm | Metric = bandwidth (slowest) + delay (all links)
  - FD = Feasible Distance (this router's metric) | RD = Reported Distance (neighbor's metric)
  - Successor = best route | Feasible Successor = backup route where RD < Successor FD
  - Unequal-cost LB via `variance` | Multicast 224.0.0.10 | AD: Internal=90, External=170
- рЯФЧ OSI Layer: L3, IP protocol 88
- рЯУЛ Prerequisites: AS number must match. `no auto-summary` recommended. Loopback for stable RID
- вЪЩпЄП Commands [IOS/IOS-XE]
  - `router eigrp 100` вЖТ `no auto-summary` вЖТ `eigrp router-id 1.1.1.1`
  - `network 10.0.0.0 0.0.255.255` вЖТ `passive-interface GigabitEthernet0/1`
  - Unequal-cost LB: `variance 2`
- рЯФН Verification
  - `show ip eigrp neighbors` | `show ip eigrp topology` | `show ip route eigrp`
- рЯФІ Troubleshooting
  - вЪ†пЄП Neighbor not forming вЖТ AS number mismatch вЖТ verify both sides match
  - вЪ†пЄП Neighbor up, routes missing вЖТ `auto-summary` summarizing wrong вЖТ `no auto-summary`
  - вЪ†пЄП Stuck in Active (SIA) вЖТ query timeout вЖТ summarize routes to limit query scope

### Inter-VLAN Routing
- рЯУЦ Layer 2 switches cannot route between VLANs вАФ two main options
  - Router on a Stick (ROAS): one router interface + dot1q sub-interfaces per VLAN
  - Multilayer Switch SVIs: virtual L3 interfaces per VLAN, requires `ip routing`
- рЯФЧ OSI Layer: Layer 3 (Network)
- рЯУЛ Prerequisites
  - ROAS: switch port facing router must be trunk
  - SVIs: `ip routing` enabled, VLAN exists, active port in VLAN, SVI not shutdown
- вЪЩпЄП ROAS
  - `interface GigabitEthernet0/0.10` вЖТ `encapsulation dot1q 10` вЖТ `ip address 192.168.10.1 255.255.255.0`
- вЪЩпЄП SVI (Multilayer Switch)
  - `ip routing`
  - `interface vlan 10` вЖТ `ip address 192.168.10.1 255.255.255.0` вЖТ `no shutdown`
  - Routed uplink: `interface GigabitEthernet0/0` вЖТ `no switchport` вЖТ `ip address ...`
- рЯФН Verification
  - `show ip route` | `show interface vlan 10`
- рЯФІ Troubleshooting
  - вЪ†пЄП ROAS not routing вЖТ VLAN tag mismatch вЖТ `encapsulation dot1q` must match VLAN ID
  - вЪ†пЄП SVI down/down вЖТ VLAN missing or no active port вЖТ `show vlan brief` вЖТ create VLAN + active port
  - вЪ†пЄП VLANs can't reach each other вЖТ `ip routing` missing on multilayer switch

### FHRP (HSRP / VRRP / GLBP)
- рЯУЦ First Hop Redundancy вАФ gateway failover
  - Shared Virtual IP (VIP) вАФ hosts use as default gateway
  - Active/Master responds to ARP with virtual MAC
  - Non-preemptive by default вАФ configure `preempt` to auto-restore
  - Gratuitous ARP updates switches after failover
- рЯУЦ Protocol Comparison
  - HSRP: Cisco proprietary, active/standby, v1=224.0.0.2, v2=224.0.0.102
  - VRRP: Open standard, master/backup, 224.0.0.18
  - GLBP: Cisco, load-balances across Active Virtual Forwarders, 224.0.0.102
- рЯФЧ OSI Layer: Layer 3 (Network)
- рЯУЛ Prerequisites: Both routers same subnet. VIP in subnet. HSRP version match. Group numbers match
- вЪЩпЄП HSRP
  - `standby version 2` вЖТ `standby 1 ip 192.168.1.254`
  - `standby 1 priority 110` вЖТ `standby 1 preempt`
  - [IOS-XR] `router hsrp` вЖТ interface вЖТ `hsrp 1 address 192.168.1.254`
- рЯФН Verification
  - `show standby` | `show standby brief`
- рЯФІ Troubleshooting
  - вЪ†пЄП Both routers Active вЖТ hellos not reaching each other вЖТ check HSRP multicast path
  - вЪ†пЄП Traffic still going to failed router вЖТ stale ARP вЖТ `clear arp-cache` on switch

## 4. IP Services

### NAT
- рЯУЦ Modifies source/destination IPs вАФ enables private hosts to reach internet
  - Static NAT: 1-to-1 permanent mapping
  - Dynamic NAT: pool of public IPs, 1-to-1, can exhaust pool
  - PAT/Overload: many private вЖТ 1 public IP using unique ports вАФ most common
  - Inside Local = private IP | Inside Global = public IP used externally
- рЯФЧ OSI Layer: Layer 3 вАФ modifies IP header
- рЯУЛ Prerequisites: Define inside/outside interfaces. ACL for traffic. Pool for dynamic NAT
- вЪЩпЄП Static NAT
  - `ip nat inside source static 192.168.1.10 203.0.113.10`
  - On interfaces: `ip nat inside` (LAN) and `ip nat outside` (WAN)
- вЪЩпЄП PAT (Overload)
  - `access-list 1 permit 192.168.0.0 0.0.255.255`
  - `ip nat inside source list 1 interface GigabitEthernet0/1 overload`
- рЯФН Verification

### SSH
- рЯУЦ Encrypted CLI access (replaces Telnet plaintext TCP 23), listens TCP 22
  - SSHv2 preferred. Requires: hostname, domain name, RSA keys, local user or AAA
  - VTY lines: `transport input ssh` only

- вЪЩпЄП Commands

  - `username admin privilege 15 secret SecureP@ss1`
  - `line vty 0 15` вЖТ `transport input ssh` вЖТ `login local`
  - L2 switch: `interface vlan 1` вЖТ IP вЖТ `no shutdown` вЖТ `ip default-gateway 192.168.1.1`

### QoS
- рЯУЦ Manages bandwidth, delay, jitter, loss for real-time traffic
  - VoIP requirements: delay вЙ§150ms, jitter вЙ§30ms, loss вЙ§1%
  - PCP (3-bit in 802.1Q tag): L2 marking | DSCP (6-bit in IP header): L3 marking (survives routing)
  - DSCP values: EF=46 (VoIP), AF4x (video), AF3x (streaming), AF2x (priority data), DF=0 (best-effort)
  - CBWFQ: bandwidth guarantee per class | LLQ: strict priority for VoIP
  - Shaping: buffers excess | Policing: drops or re-marks excess
- рЯФЧ OSI Layer: L2 (PCP) and L3 (DSCP)
- вЪЩпЄП MQC Commands
  - `class-map match-any VOIP` вЖТ `match dscp ef`
  - `policy-map WAN` вЖТ `class VOIP` вЖТ `priority percent 30` вЖТ `class class-default` вЖТ `fair-queue`
  - Apply: `service-policy output WAN`
  - IP Phone trust: `mls qos trust cos`
- рЯФН Verification
  - `show policy-map interface <int>` | `show mls qos interface <int>`
- рЯФІ Troubleshooting
  - вЪ†пЄП VoIP choppy вЖТ thresholds exceeded вЖТ `show policy-map interface` вЖТ ensure LLQ for DSCP EF
  - вЪ†пЄП DSCP markings re-marked вЖТ trust boundary wrong вЖТ `mls qos trust dscp`

### FTP and TFTP
- рЯУЦ File transfer protocols for IOS upgrades and config backups
  - TFTP: UDP 69, no auth, no encryption, built-in ACK/retry reliability, lightweight
  - FTP: TCP 20/21, username/password, full directory operations, no encryption by default
  - FTPS = FTP + TLS | SFTP = SSH-based (completely separate protocol)
- рЯФЧ OSI Layer: Layer 7. TFTP=UDP 69, FTP=TCP 20/21

## 5. Security Fundamentals

### CIA Triad & Attacks
- рЯУЦ CIA Triad
  - Confidentiality: only authorized users access data
  - Integrity: data unmodified and authentic
  - Availability: systems accessible to authorized users
  - Vulnerability вЖТ Exploit вЖТ Threat вЖТ Mitigation
- рЯУЦ Common Attack Types
  - DoS/DDoS: SYN flood exhausts TCP connections | Botnet = distributed DoS
  - ARP Poisoning: Gratuitous ARP poisons ARP tables вЖТ MitM traffic interception
  - DHCP Starvation/Poisoning: spoofed MACs exhaust pool or install rogue server
  - Reflection/Amplification: spoofed source IP вЖТ large response floods target
  - Social Engineering: phishing, vishing, smishing, tailgating, watering hole
  - Malware: Virus (host required), Worm (self-propagating), Trojan (disguised as legit)
- вЪЩпЄП Device Hardening
  - `service password-encryption` вАФ Type 7 (weak but better than plaintext)
  - `enable secret SecureP@ss123` вАФ Type 5 MD5 (always use for privileged access)
  - Disable unused interfaces: `shutdown` + add description
  - `no cdp run` / `no cdp enable` on untrusted external-facing ports
  - VTY ACL: `access-class <acl> in` on VTY lines
  - `exec-timeout 5 0` on console and VTY lines

### ACLs
- рЯУЦ Ordered packet filter вАФ first match wins, implicit deny any at end
  - Standard (1вАУ99, 1300вАУ1999): source IP only вЖТ place near DESTINATION
  - Extended (100вАУ199, 2000вАУ2699): src IP, dst IP, protocol, port вЖТ place near SOURCE
  - Named ACLs: easier to edit with sequence numbers
  - Wildcard mask: 0=must match, 1=ignore
- рЯФЧ OSI Layer: L3 (IP) and L4 (port) for extended ACLs
- рЯУЛ Prerequisites: Specific rules first. Add explicit `permit ip any any` if needed. Extended near source
- вЪЩпЄП Standard Named ACL
  - `ip access-list standard BLOCK_HOST` вЖТ `deny host 10.1.1.100` вЖТ `permit any`
  - Apply: `ip access-group BLOCK_HOST in`
- вЪЩпЄП Extended Named ACL
  - `ip access-list extended POLICY_OUT`
  - `deny tcp 192.168.10.0 0.0.0.255 host 10.0.1.100 eq 443`
  - `deny icmp 192.168.0.0 0.0.255.255 10.0.0.0 0.0.255.255`
  - `permit ip any any`
  - Apply: `ip access-group POLICY_OUT out`
  - Resequence: `ip access-list resequence POLICY_OUT 10 10`
- рЯФН Verification
  - `show access-lists` вАФ hit counters | `show ip interface <int>` вАФ applied ACLs
- рЯФІ Troubleshooting
  - вЪ†пЄП Traffic blocked unexpectedly вЖТ wrong order вЖТ review hit counters вЖТ resequence
  - вЪ†пЄП Broad permit hits before deny вЖТ more specific rules must come first
  - вЪ†пЄП ACL wrong direction вЖТ `show ip interface <int>` вЖТ check in vs out

### IPsec VPN
- рЯУЦ IPsec: encryption, authentication, integrity for IP traffic
  - Site-to-site: permanent tunnel between two gateway routers
  - Remote-access: TLS tunnel per user (Cisco AnyConnect), uses TCP 443
  - IPsec = unicast only вЖТ GRE over IPsec adds broadcast/multicast (enables OSPF over VPN)
  - DMVPN: dynamic hub-and-spoke with automatic spoke-to-spoke tunnel creation
- рЯФЧ OSI Layer: Layer 3 (Network)
- вЪЩпЄП GRE Tunnel Commands
  - `interface Tunnel0` вЖТ `ip address 172.16.0.1 255.255.255.0`
  - `tunnel source GigabitEthernet0/1` вЖТ `tunnel destination 203.0.113.2`
  - OSPF over tunnel: `ip ospf network point-to-point` on both tunnel interfaces
  - ISP default route: `ip route 0.0.0.0 0.0.0.0 203.0.113.1`
- рЯФН Verification
  - `show interfaces Tunnel0` | `show crypto isakmp sa` | `show crypto ipsec sa`
- рЯФІ Troubleshooting
  - вЪ†пЄП Tunnel up but no traffic вЖТ IPsec SA not established вЖТ check pre-shared key both sides
  - вЪ†пЄП OSPF not forming over tunnel вЖТ network type mismatch вЖТ `ip ospf network point-to-point`

### Wireless Security
- рЯУЦ WPA Certification Levels
  - WPA1: TKIP вАФ deprecated, avoid
  - WPA2: CCMP/AES вАФ current standard, widely supported
  - WPA3: GCMP/AES вАФ latest: adds SAE (replaces 4-way handshake), PMF, Forward Secrecy
  - Personal mode: PSK | Enterprise mode: 802.1X with RADIUS server
- рЯУЦ EAP Methods
  - LEAP: deprecated (Cisco)
  - EAP-FAST: Cisco, PAC + TLS tunnel
  - PEAP: TLS tunnel + MS-CHAP, server cert only
  - EAP-TLS: most secure, certs on BOTH client and server
- рЯФЧ OSI Layer: Layer 2 (Data Link)
- вЪЩпЄП WPA2 PSK (WLC GUI)
  - WLANs вЖТ Create вЖТ Security вЖТ WPA+WPA2 вЖТ AES вЖТ PSK вЖТ enter passphrase
- рЯФІ Troubleshooting
  - вЪ†пЄП Client can't connect вЖТ PSK mismatch вЖТ verify passphrase
  - вЪ†пЄП WPA3 clients fail вЖТ firmware doesn't support WPA3 вЖТ upgrade or fall back to WPA2

### AAA
- рЯУЦ Framework for access control
  - Authentication: verify identity
  - Authorization: grant permissions
  - Accounting: log activity
  - TACACS+ (Cisco): TCP 49, separates AAA, used for device administration via SSH
  - RADIUS (open standard): UDP 1812/1813, combines auth+authz, used for 802.1X/VPN/network access
  - Cisco ISE = AAA server solution
- рЯФЧ OSI Layer: Layer 7 (Application)
- рЯУЛ Prerequisites: AAA server reachable. Shared secret matches. ALWAYS configure fallback local auth
- вЪЩпЄП TACACS+ Commands

  - `aaa authorization exec default group tacacs+ local`

## 6. Automation and Programmability

### SDN & Network Planes
- рЯУЦ Three Logical Planes
  - Data Plane: forwards user traffic вАФ handled by ASICs + TCAM at wire speed (NOT CPU)
  - Control Plane: builds routing/MAC/ARP/STP tables вАФ CPU processed
  - Management Plane: SSH, SNMP, Syslog, NTP вАФ device management traffic
- рЯУЦ SDN Architecture
  - Centralizes Control Plane into a software controller
  - Southbound Interface (SBI): controller вЖТ devices (NETCONF, RESTCONF, OpenFlow, OpFlex)
  - Northbound Interface (NBI): apps/scripts вЖТ controller (REST API)
  - Cisco SD-Access: DNA Center + IS-IS underlay + VXLAN/LISP overlay
  - SD-Access node roles: Edge (end hosts), Border (WAN/external), Control (LISP mapping)
- рЯФЧ OSI Layer: All layers
- вЪЩпЄП Enable RESTCONF [IOS-XE]
  - `ip http secure-server` вЖТ `restconf` вЖТ `netconf-yang`
- рЯФН Verification
  - `show netconf-yang status` | DNA Center: Design вЖТ Provision вЖТ Assurance
- рЯФІ Troubleshooting
  - вЪ†пЄП Device not in DNA Center вЖТ discovery failed вЖТ check SNMP community + SSH credentials
  - вЪ†пЄП NETCONF failing вЖТ not enabled вЖТ `netconf-yang` in global config

### REST APIs
- рЯУЦ Representational State Transfer
  - Six constraints: stateless, client-server, cacheable, uniform interface, layered, code-on-demand
  - CRUD вЖТ HTTP: Create=POST, Read=GET, Update=PUT/PATCH, Delete=DELETE
  - Data format: JSON (most common) or XML
  - Auth: Basic, Bearer Token, OAuth
- рЯУЦ HTTP Status Codes
  - 200=OK, 201=Created, 400=Bad Request, 401=Unauthorized, 403=Forbidden, 404=Not Found, 500=Server Error
- рЯФЧ OSI Layer: Layer 7 (Application), HTTPS TCP 443
- рЯФІ Troubleshooting
  - вЪ†пЄП 401 Unauthorized вЖТ wrong credentials or expired token вЖТ re-authenticate
  - вЪ†пЄП 404 Not Found вЖТ wrong URI or wrong API version вЖТ check documentation

### JSON, XML, and YAML
- рЯУЦ JSON (JavaScript Object Notation)
  - Key-value pairs in `{}` objects and `[]` arrays
  - Types: string (quoted), number, boolean (true/false), null
  - Whitespace insignificant | Used by REST APIs
- рЯУЦ YAML (YAML Ain't Markup Language)
  - Most human-readable serialization format
  - Indentation significant (spaces only, no tabs!)
  - Starts with `---` | Lists use `-` | `key: value` pairs
  - Used by Ansible playbooks and inventories
- рЯУЦ XML (Extensible Markup Language)
  - `<key>value</key>` format | Less human-readable | Used by NETCONF
- рЯФІ Troubleshooting
  - вЪ†пЄП JSON parse error вЖТ trailing comma or unquoted string вЖТ validate at jsonlint.com
  - вЪ†пЄП YAML error вЖТ tabs instead of spaces вЖТ convert all indentation to spaces

### Ansible, Puppet, and Chef
- рЯУЦ Configuration Management вАФ fight config drift at scale
- рЯУЦ Ansible (Red Hat)
  - Agentless, push model, uses SSH, written in Python
  - Files: Playbooks (YAML), Inventory (INI/YAML), Templates (Jinja2), Variables (YAML)
- рЯУЦ Puppet
  - Agent-based (or agentless proxy), pull model, TCP 8140
  - Files: Manifests (desired state), Templates (generate manifests)
- рЯУЦ Chef
  - Agent-based, pull model, TCP 10002
  - Files: Resources вЖТ Recipes вЖТ Cookbooks вЖТ Run-List, Ruby DSL
- рЯУЦ Quick Comparison (memorize)
  - Ansible: agentless + push model + SSH
  - Puppet: agent-based + pull model + TCP 8140
  - Chef: agent-based + pull model + TCP 10002
- рЯФІ Troubleshooting
  - вЪ†пЄП Ansible SSH auth failing вЖТ add device to known_hosts or disable StrictHostKeyChecking
  - вЪ†пЄП Config drift вЖТ `ansible-playbook --diff` to detect differences вЖТ push correct state

### Traditional vs Controller-Based Networking
- рЯУЦ Traditional Networks
  - Engineers SSH to each device individually вАФ slow and error-prone
  - Per-device configuration, no central compliance enforcement
- рЯУЦ Controller-Based (SDN)
  - DNA Center centrally manages all devices
  - Intent-based: describe what you want, controller handles how
  - Centrally managed: software versions, policies, configs, zero-touch provisioning
- рЯУЦ Key Architecture Concepts
  - ASIC + TCAM: wire-speed forwarding without CPU
  - Underlay: physical IS-IS routed network (all L3 links, no STP)
  - Overlay: virtual VXLAN network on top of underlay
  - Fabric: underlay + overlay combined
- рЯФІ Troubleshooting
  - вЪ†пЄП DNA Center shows device unreachable вЖТ wrong SNMP community or SSH credentials
  - вЪ†пЄП Policy not applying вЖТ provisioning failed вЖТ check DNA Center workflow logs
