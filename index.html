# CCNA Mindmap

## 1. Networking Fundamentals

### OSI Model & TCP/IP Suite
- 📖 7 layers: Physical → Data Link → Network → Transport → Session → Presentation → Application
  - PDUs: Bit (L1), Frame (L2), Packet (L3), Segment (L4), Data (L5-7)
  - Encapsulation downward, de-encapsulation upward
  - TCP/IP 4-layer: Network Access, Internet, Transport, Application
- 🔗 OSI Layer: ALL layers
- ⚙️ Commands
  - `show ip interface brief` — L3 status
  - `show interfaces <int>` — L1/L2 status, counters
  - `ping <ip>` — L3 reachability (ICMP)
  - `show arp` — L2/L3 ARP table
- 🔍 Verification
  - `show ip protocols` — active routing protocols
- 🔧 Troubleshooting
  - ⚠️ down/down → L1 (cable/SFP) → replace cable
  - ⚠️ up/down → L2 mismatch → check encapsulation both ends
  - ⚠️ Ping fails, interface up/up → L3, no route → `show ip route`

### Network Devices
- 📖 Roles
  - Router: L3, forwards between networks
  - Switch: L2, forwards within LAN
  - Firewall/NGFW: L3–L7, filters traffic with DPI
  - AP: wireless connectivity (L1/L2)
  - WLC / DNA Center: centrally manages APs and SD-Access
  - PoE Switch: powers phones, APs, cameras via Ethernet
- 🔗 OSI Layer: Router=L3, Switch=L2, AP=L1/2, Firewall=L3-7
- ⚙️ Commands
  - [IOS/IOS-XE] `interface GigabitEthernet0/0` → `ip address 192.168.1.1 255.255.255.0` → `no shutdown`
  - [IOS-XR] `interface GigabitEthernet0/0/0/0` → `ipv4 address 192.168.1.1/24` → `no shutdown`
- 🔍 Verification
  - `show ip interface brief` — all interfaces and status
  - `show version` — platform and IOS version
- 🔧 Troubleshooting
  - ⚠️ Interface admin down → forgot `no shutdown`
  - ⚠️ Up/up but no traffic → duplex/speed mismatch → `show interfaces` → force settings

### Interfaces & Cables
- 📖 Cable Standards
  - UTP copper: RJ-45, IEEE 802.3, max 100m
  - 10/100BASE-T: 2 pairs | 1000BASE-T/10GBASE-T: 4 pairs bidirectional
  - Auto MDI-X: modern devices auto-detect straight-through vs crossover
  - SMF: laser, up to 80km | MMF: LED, up to 550m, cheaper
- 🔗 OSI Layer: Layer 1 (Physical)
- ⚙️ Commands
  - `speed 1000` + `duplex full` on interface
  - `description ## to SW1 ##`
- 🔍 Verification
  - `show interfaces <int>` — speed, duplex, CRC/runts/giants
  - `show interfaces status` (switch)
- 🔧 Troubleshooting
  - ⚠️ High CRC errors → bad cable or duplex mismatch → replace cable or force settings
  - ⚠️ Runts (<64B) → duplex mismatch → force `duplex full`
  - ⚠️ Giants (>1518B) → jumbo frames one-sided → align MTU both sides

### IPv4 Addressing & Subnetting
- 📖 Key Concepts
  - 32-bit, 4 octets dotted decimal with CIDR prefix
  - Usable hosts = 2^n - 2 (n = host bits)
  - Class A /8 (1–126), Class B /16 (128–191), Class C /24 (192–223)
  - Private (RFC 1918): 10/8, 172.16/12, 192.168/16
  - Network address = all host bits 0 | Broadcast = all host bits 1
  - VLSM: variable-length subnets for efficient addressing
- 🔗 OSI Layer: Layer 3 (Network)
- ⚙️ Commands
  - [IOS/IOS-XE] `ip address 192.168.1.1 255.255.255.0`
  - [IOS-XR] `ipv4 address 192.168.1.1/24`
  - Windows: `ipconfig /all` | Linux: `ip addr show`
- 📋 Default Gateway
  - End hosts: set to the L3 interface IP in their subnet (router sub-interface, SVI, or FHRP VIP)
  - L2 switches (management): `ip default-gateway 192.168.1.1` — required for SSH/SNMP from other subnets
  - Routers: `ip route 0.0.0.0 0.0.0.0 <next-hop>` — Gateway of Last Resort toward ISP
  - DHCP clients receive default gateway via `default-router` option in DHCP pool
- 🔧 Troubleshooting
  - ⚠️ Can't reach gateway → wrong subnet mask → reconfigure host
  - ⚠️ 169.254.x.x (APIPA) → DHCP failure → `ipconfig /release` + `/renew`
  - ⚠️ L2 switch unreachable from other subnet → `ip default-gateway` missing → add it

### IPv6 Addressing
- 📖 Address Types
  - 128-bit, 8 groups of 16-bit hex, colon-separated
  - Shorten: remove leading zeros, :: for longest all-zero run (once only), lowercase
  - Global Unicast 2000::/3 (public) | Unique Local FDxx::/48 (private)
  - Link-Local FE80::/10 (auto-generated) | Multicast FF00::/8
  - EUI-64: derive Interface ID from MAC (insert FFFE, flip 7th bit)
  - SLAAC: auto-config via NDP Router Advertisements (NDP replaces ARP)
- 🔗 OSI Layer: Layer 3 (Network)
- 📋 Prerequisites: `ipv6 unicast-routing` must be enabled globally
- ⚙️ Commands
  - `ipv6 unicast-routing` (global)
  - `ipv6 address 2001:db8::1/64` on interface
  - EUI-64: `ipv6 address 2001:db8::/64 eui-64`
  - SLAAC: `ipv6 address autoconfig`
- 🔍 Verification
  - `show ipv6 interface brief` | `show ipv6 neighbors` | `show ipv6 route`
- 🔧 Troubleshooting
  - ⚠️ IPv6 not routing → `ipv6 unicast-routing` missing
  - ⚠️ Neighbors not forming → `ipv6 enable` on interface

### TCP vs UDP
- 📖 TCP: connection-oriented, reliable
  - 3-way handshake: SYN → SYN-ACK → ACK
  - ACKs, retransmissions, sequencing, flow control
  - Use for: HTTP/S, SSH, FTP, SMTP, BGP
- 📖 UDP: connectionless, best-effort
  - No handshake, lower overhead, faster
  - Use for: DNS, DHCP, TFTP, SNMP, NTP, VoIP
- 🔗 OSI Layer: Layer 4 (Transport)
- ⚙️ Key Port Numbers
  - TCP: FTP 20/21, SSH 22, Telnet 23, HTTP 80, HTTPS 443
  - UDP: DNS 53, DHCP 67/68, TFTP 69, SNMP 161/162, Syslog 514, NTP 123
- 🔧 Troubleshooting
  - ⚠️ App unreachable, ping works → port blocked by ACL → `show access-lists`
  - ⚠️ Slow transfer → TCP window/packet loss → `show interfaces`

### Wireless Principles
- 📖 Key Concepts
  - 2.4 GHz: better range/penetration, congested, non-overlapping channels: 1, 6, 11
  - 5 GHz: more non-overlapping channels, less congestion, shorter range
  - SSID: human-readable network name | CSMA/CA: collision avoidance
  - WPA2 (CCMP/AES) current | WPA3 (GCMP/AES) latest
- 🔗 OSI Layer: L1 (Physical) and L2 (Data Link)
- 🔧 Troubleshooting
  - ⚠️ Poor signal → channel overlap → use analyzer → change to non-overlapping channel
  - ⚠️ Connects but no internet → DHCP not reachable → check VLAN tag on trunk

### Virtualization Fundamentals
- 📖 Types
  - Type 1 Hypervisor (bare-metal): VMware ESXi, Hyper-V — data center
  - Type 2 Hypervisor (hosted): VMware Workstation, VirtualBox — personal
  - Containers (Docker): share host OS kernel, ~ms boot, Kubernetes orchestration
  - VRF: multiple routing tables on one router (Layer 3 segmentation)
- 🔗 OSI Layer: L3 for VRF; L1/L2 for virtual switches
- ⚙️ VRF Commands
  - [IOS/IOS-XE] `ip vrf CUST_A` → interface: `ip vrf forwarding CUST_A` → `ip address ...`
  - [IOS-XR] `vrf CUST_A` → interface: `vrf CUST_A` → `ipv4 address ...`
- 🔍 Verification
  - `show ip vrf` | `show ip route vrf CUST_A` | `ping vrf CUST_A 10.1.1.2`

## 2. Network Access

### VLANs
- 📖 Logically segments a switch into separate broadcast domains
  - VLAN ID range: 1–4094 (normal: 1–1005, extended: 1006–4094)
  - VLAN 1 = default, cannot be deleted
  - Traffic between VLANs requires Layer 3 routing
- 🔗 OSI Layer: Layer 2 (Data Link)
- 📋 Prerequisites: Plan VLAN IDs and subnets. VLANs must exist on ALL switches in the path
- ⚙️ Access Port
  - `vlan 10` → `name SALES`
  - `switchport mode access` → `switchport access vlan 10`
  - Voice VLAN: `switchport voice vlan 20`
- ⚙️ Trunk Port
  - `switchport trunk encapsulation dot1q` (if needed)
  - `switchport mode trunk` → `switchport trunk allowed vlan 10,20,30`
  - `switchport trunk native vlan 99`
- 🔍 Verification
  - `show vlan brief` | `show interfaces trunk` | `show interfaces <int> switchport`
- 🔧 Troubleshooting
  - ⚠️ Host can't reach same-VLAN host → port not in correct VLAN → reassign
  - ⚠️ VLAN not crossing trunk → not in allowed list → `switchport trunk allowed vlan add <id>`
  - ⚠️ Native VLAN mismatch warning → `switchport trunk native vlan <id>` on BOTH sides

### Trunking (802.1Q)
- 📖 Carries multiple VLANs over a single link
  - 802.1Q tag (4 bytes): 12-bit VLAN ID, 3-bit PCP (QoS), 1-bit DEI
  - Native VLAN sent untagged — must match both ends
  - ISL: Cisco proprietary, obsolete — use 802.1Q only
  - DTP: auto-negotiates trunks — disable on production (`switchport nonegotiate`)
- 🔗 OSI Layer: Layer 2 (Data Link)
- 📋 Prerequisites: VLANs exist both sides. Native VLAN must match. Disable DTP
- ⚙️ Commands
  - `switchport trunk encapsulation dot1q` → `switchport mode trunk`
  - `switchport trunk native vlan 99` → `switchport nonegotiate`
- 🔍 Verification
  - `show interfaces trunk` | `show interfaces <int> switchport`
- 🔧 Troubleshooting
  - ⚠️ Native VLAN mismatch → align on BOTH sides
  - ⚠️ VLAN not active on trunk → VLAN not created locally → `vlan <id>`
  - ⚠️ Trunk not forming → force both sides `switchport mode trunk`

### Spanning Tree Protocol
- 📖 Prevents L2 loops by blocking redundant ports
  - Root Bridge: lowest Bridge ID (priority + MAC) — all ports Designated/Forwarding
  - Root Port: best path to Root Bridge | Designated: best port per segment
  - STP states: Blocking → Listening (15s) → Learning (15s) → Forwarding
  - RSTP (802.1w): ~1–2s convergence via handshake
  - RSTP roles: Alternate (backup Root Port), Backup (backup Designated Port)
  - STP port cost: 10Gbps=2, 1Gbps=4, 100Mbps=19, 10Mbps=100
- 🔗 OSI Layer: Layer 2 (Data Link)
- 📋 Prerequisites: Same STP variant across switches. PortFast ONLY on end-host ports. BPDU Guard on all access ports
- ⚙️ Commands
  - `spanning-tree vlan 10 root primary` (priority=24576)
  - `spanning-tree vlan 10 root secondary` (priority=28672)
  - PortFast: `spanning-tree portfast` (per-port) or `spanning-tree portfast default`
  - BPDU Guard: `spanning-tree bpduguard enable` (per-port) or `spanning-tree portfast bpduguard default`
  - Mode: `spanning-tree mode rapid-pvst`
- 🔍 Verification
  - `show spanning-tree` | `show spanning-tree vlan 10` | `show spanning-tree summary`
- 🔧 Troubleshooting
  - ⚠️ Broadcast storm → L2 loop → `show spanning-tree` → disable offending port immediately
  - ⚠️ Port stuck in BLK → wrong Root Bridge → manually configure correct root
  - ⚠️ PortFast port err-disabled → switch plugged in (BPDU received) → unplug → shutdown/no shutdown

### EtherChannel (LACP)
- 📖 Bundles multiple physical links into one logical interface
  - STP sees as single link — no ports blocked
  - LACP (IEEE 802.3ad): active initiates, passive waits
  - PAgP (Cisco): desirable initiates, auto waits
  - Static `on` mode: both sides must be `on`
  - All member ports must match: speed, duplex, VLAN config
- 🔗 OSI Layer: L2 (and L3 for Layer 3 EtherChannel)
- 📋 Prerequisites: Identical config on all members. Mismatch = port suspended (s flag)
- ⚙️ Commands
  - `interface range GigabitEthernet0/0 - 3` → `channel-group 1 mode active`
  - `interface port-channel 1` → configure trunk/access/IP
  - [IOS-XR] `interface Bundle-Ether1` → member: `bundle id 1 mode active`
- 🔍 Verification
  - `show etherchannel summary` — SU=L2 in-use, P=bundled, s=suspended, D=down
  - `show lacp neighbor`
- 🔧 Troubleshooting
  - ⚠️ Port shows `s` (suspended) → config mismatch → `show etherchannel detail` → align
  - ⚠️ Channel not forming → both sides passive → one must be `active`
  - ⚠️ Uneven traffic → `port-channel load-balance src-dst-ip`

### CDP and LLDP
- 📖 Layer 2 neighbor discovery protocols
  - CDP: Cisco proprietary, ON by default, 60s timer, 180s hold-time
  - LLDP: IEEE 802.1AB, OFF by default on Cisco, 30s timer, 120s hold-time, 2s reinit delay
  - Both reveal: hostname, IP, device type, IOS version, connected port — disable on external ports
- 🔗 OSI Layer: Layer 2 (Data Link)
- ⚙️ Commands
  - CDP: `no cdp run` (global) | `no cdp enable` (per-interface)
  - LLDP: `lldp run` (global) | `lldp transmit` AND `lldp receive` (per-interface, both required)
  - [IOS-XR] global `lldp` → interface: `lldp enable`
- 🔍 Verification
  - `show cdp neighbors detail` | `show lldp neighbors detail`
- 🔧 Troubleshooting
  - ⚠️ CDP neighbor missing → CDP disabled one side → `show cdp interface`
  - ⚠️ LLDP neighbor missing → tx/rx not both enabled → add `lldp transmit` + `lldp receive`

### Wireless Architectures
- 📖 AP Deployment Models
  - Autonomous AP: self-contained, individual config, small networks only
  - Lightweight AP (CAPWAP split-MAC)
    - AP handles: RF, encryption, beacons, packet prioritization (real-time)
    - WLC handles: auth, QoS, roaming, channel assignment (non-real-time)
    - CAPWAP tunnels: UDP 5246 control (encrypted), UDP 5247 data
    - AP connects to switch ACCESS port (not trunk)
  - Cloud-based AP (Cisco Meraki): cloud management, local data forwarding
- 📖 WLC Deployment Modes
  - Unified HW appliance: up to 6000 APs
  - Cloud-based VM: up to 3000 APs | Embedded in switch: up to 200 APs
  - Mobility Express (in AP): up to 100 APs
- 🔗 OSI Layer: L1/L2 wireless, L3 CAPWAP tunnels
- 📋 Prerequisites: WLC reachable via DHCP Option 43 or DNS. X.509 certs on AP and WLC
- 🔧 Troubleshooting
  - ⚠️ AP not joining WLC → CAPWAP failing → check Option 43 → `debug capwap client errors`
  - ⚠️ No IP for clients → DHCP not reaching WLC dynamic interface → check VLAN mapping

### Port Security
- 📖 Restricts which MACs can send on a switchport
  - Default: 1 MAC, violation mode = shutdown (err-disable)
  - Violation modes: Shutdown (err-disable + log), Restrict (drop + log + count), Protect (drop silently)
  - Sticky: saves dynamically learned MACs permanently to running-config
- 🔗 OSI Layer: Layer 2 (Data Link)
- ⚙️ Commands
  - `switchport mode access` → `switchport port-security`
  - `switchport port-security maximum 2`
  - `switchport port-security mac-address sticky`
  - `switchport port-security violation restrict`
  - Auto-recover: `errdisable recovery cause psecure-violation` → `errdisable recovery interval 300`
- 🔍 Verification
  - `show port-security interface <int>` | `show port-security address`
- 🔧 Troubleshooting
  - ⚠️ Port err-disabled → unauthorized device → shutdown/no shutdown or errdisable recovery
  - ⚠️ Legit device blocked → max too low → increase `switchport port-security maximum`

### DHCP Snooping
- 📖 Filters DHCP messages on untrusted switch ports
  - All ports untrusted by default — mark uplinks as trusted
  - Untrusted: drops DHCP Server msgs (OFFER/ACK/NAK), validates Client CHADDR vs src MAC
  - Builds DHCP Snooping Binding Table (required by DAI)
  - Option 82 added by default — can cause issues in multi-switch deployments
- 🔗 OSI Layer: Layer 2 (Data Link)
- 📋 Prerequisites: Enable globally + per-VLAN. Mark uplinks trusted. Enable before DAI
- ⚙️ Commands
  - `ip dhcp snooping` → `ip dhcp snooping vlan 10,20`
  - Uplink: `ip dhcp snooping trust`
  - Rate-limit: `ip dhcp snooping limit rate 15`
  - Disable Option 82: `no ip dhcp snooping information option`
- 🔍 Verification
  - `show ip dhcp snooping` | `show ip dhcp snooping binding` | `show ip dhcp snooping statistics`
- 🔧 Troubleshooting
  - ⚠️ Clients not getting DHCP → uplink not trusted → `ip dhcp snooping trust`
  - ⚠️ "inconsistent relay info" drops → Option 82 mismatch → `no ip dhcp snooping information option`

### Dynamic ARP Inspection (DAI)
- 📖 Validates ARP packets vs DHCP Snooping binding table on untrusted ports
  - Sender MAC ≠ binding entry → ARP dropped — prevents ARP poisoning (MitM)
  - Trusted ports forward all ARP normally
  - ARP ACLs for static-IP hosts not in binding table
- 🔗 OSI Layer: Layer 2 (Data Link)
- 📋 Prerequisites: DHCP Snooping enabled and binding table populated
- ⚙️ Commands
  - `ip arp inspection vlan 10,20`
  - Uplink: `ip arp inspection trust`
  - Rate-limit: `ip arp inspection limit rate 100`
  - Validate: `ip arp inspection validate src-mac dst-mac ip`
  - ARP ACL: `arp access-list STATIC` → `permit ip host 10.1.1.10 mac host aabb.cc00.1234` → apply with `ip arp inspection filter STATIC vlan 10`
- 🔍 Verification
  - `show ip arp inspection` | `show ip arp inspection interfaces`
- 🔧 Troubleshooting
  - ⚠️ Legit ARP dropped → static IP host not in snooping table → create ARP ACL
  - ⚠️ Port err-disabled from ARP rate → adjust rate or `errdisable recovery cause arp-inspection`

## 3. IP Connectivity

### Routing Table & Forwarding
- 📖 Router forwarding decision order
  - Longest prefix match wins (most specific route)
  - Tie → lowest Administrative Distance (AD)
  - Tie → lowest metric (cost/hop count/bandwidth)
  - Default route: 0.0.0.0/0 = Gateway of Last Resort
  - Route codes: C=Connected, L=Local, S=Static, O=OSPF, D=EIGRP, R=RIP
- 📖 Administrative Distance (memorize)
  - Connected=0, Static=1, EIGRP Int=90, OSPF=110, RIP=120, EIGRP Ext=170, Unusable=255
- 🔗 OSI Layer: Layer 3 (Network)
- 🔍 Verification
  - `show ip route` | `show ip route 10.1.1.0` | `show ip route summary` | `show ip protocols`
- 🔧 Troubleshooting
  - ⚠️ Wrong path → less-specific route winning → add more-specific route
  - ⚠️ "Destination unreachable" → no route → `show ip route` → add route
  - ⚠️ Route flapping → neighbor instability → `debug ip routing`

### Static Routing
- 📖 Manually configured routes — no auto-adaptation to failures
  - Types: Network, Host (/32), Default (0.0.0.0/0), Floating static (backup with higher AD)
  - Recursive: next-hop IP only | Directly-attached: exit interface | Fully-specified: both
  - On Ethernet interfaces: always use next-hop IP (not just exit interface)
- 🔗 OSI Layer: Layer 3 (Network)
- 📋 Prerequisites: Exit interface up. Next-hop IP reachable
- ⚙️ Commands
  - Network: `ip route 10.1.0.0 255.255.0.0 192.168.1.2`
  - Default: `ip route 0.0.0.0 0.0.0.0 203.0.113.1`
  - Floating: `ip route 10.1.0.0 255.255.0.0 192.168.2.2 200` (AD=200 > OSPF 110)
  - IPv6: `ipv6 route 2001:db8:1::/64 2001:db8:12::2`
  - [IOS-XR] `router static` → `address-family ipv4 unicast` → `10.1.0.0/16 192.168.1.2`
- 🔍 Verification
  - `show ip route static` | `show ip route 10.1.0.0`
- 🔧 Troubleshooting
  - ⚠️ Static route missing → next-hop unreachable → verify next-hop
  - ⚠️ Floating static not activating → AD too low → must be higher than primary protocol AD

### OSPF (OSPFv2)
- 📖 Link-State IGP using Dijkstra's SPF algorithm
  - All areas must connect to Area 0 (backbone) | ABR = router in multiple areas (max 2)
  - Cost = reference BW / interface BW (default ref = 100 Mbps — increase for modern networks)
  - Router ID: manual > highest loopback > highest physical IP
  - DR/BDR election on broadcast: highest priority (default=1) → highest RID
  - Timers: Hello=10s, Dead=40s (Ethernet)
- 📖 Neighbor states: Down → Init → 2-Way → ExStart → Exchange → Loading → Full
- 🔗 OSI Layer: L3, IP protocol 89, multicast 224.0.0.5 / 224.0.0.6
- 📋 Prerequisites: Area#, Hello/Dead timers, subnet, MTU, network type, unique RIDs must all match
- ⚙️ Commands [IOS/IOS-XE]
  - `router ospf 1` → `router-id 1.1.1.1`
  - `auto-cost reference-bandwidth 10000` (10 Gbps reference — set on ALL routers)
  - `network 10.0.0.0 0.0.0.255 area 0`
  - `passive-interface GigabitEthernet0/1`
  - Per-interface: `ip ospf 1 area 0`
  - Manual cost: `ip ospf cost 100` | Prevent DR: `ip ospf priority 0`
- ⚙️ Commands [IOS-XR]
  - `router ospf 1` → `router-id 1.1.1.1` → `area 0` → `interface GigabitEthernet0/0/0/0`
- 🔍 Verification
  - `show ip ospf neighbor` — must reach FULL state
  - `show ip ospf interface brief` — area, cost, DR/BDR
  - `show ip ospf database` | `show ip route ospf`
- 🔧 Troubleshooting
  - ⚠️ Stuck in INIT → ACL blocking 224.0.0.5 → `debug ip ospf hello` → remove ACL block
  - ⚠️ Stuck in EXSTART/EXCHANGE → MTU mismatch → `ip ospf mtu-ignore` or align MTU
  - ⚠️ Neighbors up, routes missing → network type mismatch → `ip ospf network <type>`
  - ⚠️ Wrong cost → `auto-cost reference-bandwidth` not updated → set on ALL routers

### EIGRP
- 📖 Advanced distance-vector IGP — Cisco, now open standard
  - DUAL algorithm | Metric = bandwidth (slowest) + delay (all links)
  - FD = Feasible Distance (this router's metric) | RD = Reported Distance (neighbor's metric)
  - Successor = best route | Feasible Successor = backup route where RD < Successor FD
  - Unequal-cost LB via `variance` | Multicast 224.0.0.10 | AD: Internal=90, External=170
- 🔗 OSI Layer: L3, IP protocol 88
- 📋 Prerequisites: AS number must match. `no auto-summary` recommended. Loopback for stable RID
- ⚙️ Commands [IOS/IOS-XE]
  - `router eigrp 100` → `no auto-summary` → `eigrp router-id 1.1.1.1`
  - `network 10.0.0.0 0.0.255.255` → `passive-interface GigabitEthernet0/1`
  - Unequal-cost LB: `variance 2`
- 🔍 Verification
  - `show ip eigrp neighbors` | `show ip eigrp topology` | `show ip route eigrp`
- 🔧 Troubleshooting
  - ⚠️ Neighbor not forming → AS number mismatch → verify both sides match
  - ⚠️ Neighbor up, routes missing → `auto-summary` summarizing wrong → `no auto-summary`
  - ⚠️ Stuck in Active (SIA) → query timeout → summarize routes to limit query scope

### Inter-VLAN Routing
- 📖 Layer 2 switches cannot route between VLANs — two main options
  - Router on a Stick (ROAS): one router interface + dot1q sub-interfaces per VLAN
  - Multilayer Switch SVIs: virtual L3 interfaces per VLAN, requires `ip routing`
- 🔗 OSI Layer: Layer 3 (Network)
- 📋 Prerequisites
  - ROAS: switch port facing router must be trunk
  - SVIs: `ip routing` enabled, VLAN exists, active port in VLAN, SVI not shutdown
- ⚙️ ROAS
  - `interface GigabitEthernet0/0.10` → `encapsulation dot1q 10` → `ip address 192.168.10.1 255.255.255.0`
- ⚙️ SVI (Multilayer Switch)
  - `ip routing`
  - `interface vlan 10` → `ip address 192.168.10.1 255.255.255.0` → `no shutdown`
  - Routed uplink: `interface GigabitEthernet0/0` → `no switchport` → `ip address ...`
- 🔍 Verification
  - `show ip route` | `show interface vlan 10`
- 📋 Default Gateway for hosts
  - ROAS: hosts in each VLAN must use the sub-interface IP as their default gateway
    - e.g. VLAN 10 hosts → DGW = `192.168.10.1` (GigabitEthernet0/0.10)
  - SVI: hosts in each VLAN must use the SVI IP as their default gateway
    - e.g. VLAN 10 hosts → DGW = `192.168.10.1` (interface vlan 10)
  - With FHRP: hosts use the Virtual IP (VIP) — see HSRP/VRRP/GLBP node
- 🔧 Troubleshooting
  - ⚠️ ROAS not routing → VLAN tag mismatch → `encapsulation dot1q` must match VLAN ID
  - ⚠️ SVI down/down → VLAN missing or no active port → `show vlan brief` → create VLAN + active port
  - ⚠️ VLANs can't reach each other → `ip routing` missing on multilayer switch
  - ⚠️ Hosts can reach gateway but not other VLANs → host DGW pointing to wrong IP → fix host config

### FHRP (HSRP / VRRP / GLBP)
- 📖 First Hop Redundancy — gateway failover
  - Shared Virtual IP (VIP) — hosts use as default gateway
  - Active/Master responds to ARP with virtual MAC
  - Non-preemptive by default — configure `preempt` to auto-restore
  - Gratuitous ARP updates switches after failover
- 📖 Protocol Comparison
  - HSRP: Cisco proprietary, active/standby, v1=224.0.0.2, v2=224.0.0.102
  - VRRP: Open standard, master/backup, 224.0.0.18
  - GLBP: Cisco, load-balances across Active Virtual Forwarders, 224.0.0.102
- 🔗 OSI Layer: Layer 3 (Network)
- 📋 Prerequisites: Both routers same subnet. VIP in subnet. HSRP version match. Group numbers match
- ⚙️ HSRP
  - `standby version 2` → `standby 1 ip 192.168.1.254`
  - `standby 1 priority 110` → `standby 1 preempt`
  - [IOS-XR] `router hsrp` → interface → `hsrp 1 address 192.168.1.254`
- 🔍 Verification
  - `show standby` | `show standby brief`
- 🔧 Troubleshooting
  - ⚠️ Both routers Active → hellos not reaching each other → check HSRP multicast path
  - ⚠️ Traffic still going to failed router → stale ARP → `clear arp-cache` on switch

## 4. IP Services

### NAT
- 📖 NAT Types
  - Static NAT: 1-to-1 permanent mapping — supports inbound connections to inside hosts
  - Dynamic NAT: pool of public IPs assigned on-demand, 1-to-1, no port overloading
    - Pool exhaustion: if all public IPs in use → NEW connections are DROPPED (not queued)
    - Entries age out: TCP 24h, UDP 5min, ICMP 1min by default
    - Use case: block of public IPs, not many simultaneous sessions
  - PAT / NAT Overload: many private IPs → 1 public IP using unique source ports — most common
    - 16-bit port field = up to ~65,000 concurrent sessions per public IP
    - Use case: single ISP public IP (home/SMB), large enterprise behind one public IP
  - Inside Local = private source IP | Inside Global = public IP used externally
  - Outside Global = destination IP (public server)
- 🔗 OSI Layer: Layer 3 — modifies IP header (and L4 for PAT)
- 📋 Prerequisites: Define inside/outside on interfaces. ACL to match inside hosts. Pool for Dynamic NAT
- ⚙️ Static NAT
  - `ip nat inside source static 192.168.1.10 203.0.113.10`
  - LAN interface: `ip nat inside` | WAN interface: `ip nat outside`
- ⚙️ Dynamic NAT (pool)
  - `ip nat pool PUBLIC_POOL 203.0.113.10 203.0.113.20 netmask 255.255.255.0`
  - `access-list 1 permit 192.168.1.0 0.0.0.255`
  - `ip nat inside source list 1 pool PUBLIC_POOL`
  - LAN interface: `ip nat inside` | WAN interface: `ip nat outside`
- ⚙️ PAT via interface (most common)
  - `access-list 1 permit 192.168.0.0 0.0.255.255`
  - `ip nat inside source list 1 interface GigabitEthernet0/1 overload`
- ⚙️ PAT via pool
  - `ip nat pool PAT_POOL 203.0.113.1 203.0.113.5 netmask 255.255.255.0`
  - `ip nat inside source list 1 pool PAT_POOL overload`
- 🔍 Verification
  - `show ip nat translations` — Inside Local ↔ Inside Global mappings + ports (PAT)
  - `show ip nat statistics` — active entries, pool utilization, misses (= pool exhausted or ACL miss)
  - `clear ip nat translation *` — clear all dynamic/PAT entries
- 🔧 Troubleshooting
  - ⚠️ Dynamic NAT pool exhausted → `show ip nat statistics` misses rising → expand pool or convert to PAT
  - ⚠️ NAT not translating → ACL doesn't match inside host subnet → verify `access-list` matches exactly
  - ⚠️ Static NAT not working → inside/outside assigned to wrong interfaces → swap with `ip nat inside/outside`
  - ⚠️ PAT entries not clearing → sessions still active → `clear ip nat translation *` then verify

### DHCP
- 📖 Automatically assigns IP, mask, gateway, DNS via DORA
  - Discover → Offer → Request → Acknowledge (UDP 67/68)
  - `ip helper-address` forwards DHCP broadcasts to remote server as unicast
- 🔗 OSI Layer: Layer 7, UDP 67/68
- ⚙️ Server Config
  - `ip dhcp excluded-address 192.168.1.1 192.168.1.10`
  - `ip dhcp pool VLAN10` → `network 192.168.1.0 255.255.255.0` → `default-router 192.168.1.1` → `dns-server 8.8.8.8` → `lease 7`
- ⚙️ Relay
  - `interface GigabitEthernet0/1` → `ip helper-address 10.1.1.100`
- ⚙️ Client
  - `interface GigabitEthernet0/0` → `ip address dhcp`
- 🔍 Verification
  - `show ip dhcp binding` | `show ip dhcp pool` | Windows: `ipconfig /release` + `/renew`
- 🔧 Troubleshooting
  - ⚠️ 169.254.x.x (APIPA) → DHCP unreachable → check `ip helper-address` → `debug ip dhcp server events`
  - ⚠️ Pool exhausted → increase pool or reduce lease → `clear ip dhcp binding *`
  - ⚠️ Wrong gateway → `default-router` wrong in pool → fix it

### DNS
- 📖 Resolves hostnames to IPs (UDP/TCP 53)
  - Clients cache responses | Hosts file checked before DNS
  - Router as DNS client: `ip name-server` | as simple server: `ip dns server` + `ip host`
- 🔗 OSI Layer: Layer 7, UDP/TCP 53
- ⚙️ Commands
  - Client: `ip name-server 8.8.8.8 8.8.4.4` → `ip domain-name company.local`
  - Server: `ip dns server` → `ip host R2 10.0.0.2`
- 🔍 Verification
  - `show hosts` | Windows: `ipconfig /displaydns` `ipconfig /flushdns` `nslookup google.com`
- 🔧 Troubleshooting
  - ⚠️ Name resolution failing → DNS server unreachable → `ping 8.8.8.8`
  - ⚠️ IOS CLI hangs → `ip domain lookup` with no DNS → `no ip domain lookup`

### NTP
- 📖 Clock synchronization via UDP 123
  - Stratum 0=atomic/GPS | Stratum 1=connected to stratum 0 | each hop +1
  - `ntp update-calendar` syncs hardware clock from NTP
  - Auth optional but recommended
- 🔗 OSI Layer: Layer 7, UDP 123
- ⚙️ Commands
  - `clock timezone EST -5` → `clock summer-time EDT recurring`
  - `ntp server 216.239.35.0 prefer` → `ntp update-calendar`
  - Server: `ntp master 3`
  - Auth: `ntp authenticate` → `ntp authentication-key 1 md5 Key1` → `ntp trusted-key 1`
- 🔍 Verification
  - `show clock detail` | `show ntp associations` | `show ntp status`
- 🔧 Troubleshooting
  - ⚠️ Not syncing → UDP 123 blocked → `ping <ntp-server>` → check ACL
  - ⚠️ Wrong timestamps → time zone not set → `clock timezone`

### SNMP
- 📖 Monitors and manages network devices
  - Agent (device) listens UDP 161 | NMS listens for traps UDP 162
  - MIB: variables stored as Object IDs (OIDs)
  - SNMPv1/v2c: community strings (plaintext) — avoid if possible
  - SNMPv3: auth (MD5/SHA) + encryption (AES) — always prefer
- 🔗 OSI Layer: Layer 7, UDP 161/162
- ⚙️ SNMPv2c
  - `snmp-server community PUBLIC ro`
  - `snmp-server host 10.1.1.100 version 2c PUBLIC`
  - `snmp-server enable traps`
- ⚙️ SNMPv3
  - `snmp-server group ADMINS v3 priv`
  - `snmp-server user admin ADMINS v3 auth sha AuthP@ss priv aes 128 PrivP@ss`
- 🔍 Verification
  - `show snmp` | `show snmp host`
- 🔧 Troubleshooting
  - ⚠️ NMS not receiving data → community mismatch → `show snmp community`
  - ⚠️ Traps not arriving → `snmp-server host` missing

### Syslog
- 📖 Logs events by severity 0–7
  - 0=Emergency, 1=Alert, 2=Critical, 3=Error, 4=Warning, 5=Notice, 6=Info, 7=Debug
  - Mnemonic: Every Awesome Cisco Engineer Will Need Ice cream Daily
  - Destinations: Console, Buffer (RAM), VTY (`terminal monitor`), External (UDP 514)
  - Format: seq: timestamp: %facility-severity-MNEMONIC: description
- 🔗 OSI Layer: Layer 7, UDP 514
- ⚙️ Commands
  - `logging 10.1.1.100` → `logging trap informational`
  - `logging buffered 16384 debugging`
  - `service timestamps log datetime msec localtime show-timezone`
  - `logging synchronous` on console/VTY lines
- 🔍 Verification
  - `show logging` | `terminal monitor` (for SSH sessions)
- 🔧 Troubleshooting
  - ⚠️ Logs not on server → UDP 514 blocked or not configured → `show logging`
  - ⚠️ Wrong timestamps → NTP not synced or `service timestamps` missing

### SSH
- 📖 Encrypted CLI access (replaces Telnet plaintext TCP 23), listens TCP 22
  - SSHv2 preferred. Requires: hostname, domain name, RSA keys, local user or AAA
  - VTY lines: `transport input ssh` only
- 🔗 OSI Layer: Layer 7, TCP 22
- 📋 Prerequisites: `hostname` + `ip domain-name` configured. RSA keys generated. User or AAA configured
- ⚙️ Commands
  - `hostname R1` → `ip domain-name company.local`
  - `crypto key generate rsa modulus 2048`
  - `ip ssh version 2`
  - `username admin privilege 15 secret SecureP@ss1`
  - `line vty 0 15` → `transport input ssh` → `login local`
  - L2 switch: `interface vlan 1` → IP → `no shutdown` → `ip default-gateway 192.168.1.1`
  - [IOS-XR] `ssh server v2` → `ssh server vrf default`
- 🔍 Verification
  - `show ip ssh` | `show ssh`
- 🔧 Troubleshooting
  - ⚠️ Connection refused → no RSA keys → `show ip ssh` → generate keys
  - ⚠️ Connects then drops → `transport input ssh` or `login local` missing
  - ⚠️ Can't SSH to switch → no SVI IP or no `ip default-gateway`

### QoS
- 📖 Manages bandwidth, delay, jitter, loss for real-time traffic
  - VoIP requirements: delay ≤150ms, jitter ≤30ms, loss ≤1%
  - PCP (3-bit in 802.1Q tag): L2 marking | DSCP (6-bit in IP header): L3 marking (survives routing)
  - DSCP values: EF=46 (VoIP), AF4x (video), AF3x (streaming), AF2x (priority data), DF=0 (best-effort)
  - CBWFQ: bandwidth guarantee per class | LLQ: strict priority for VoIP
  - Shaping: buffers excess | Policing: drops or re-marks excess
- 🔗 OSI Layer: L2 (PCP) and L3 (DSCP)
- ⚙️ MQC Commands
  - `class-map match-any VOIP` → `match dscp ef`
  - `policy-map WAN` → `class VOIP` → `priority percent 30` → `class class-default` → `fair-queue`
  - Apply: `service-policy output WAN`
  - IP Phone trust: `mls qos trust cos`
- 🔍 Verification
  - `show policy-map interface <int>` | `show mls qos interface <int>`
- 🔧 Troubleshooting
  - ⚠️ VoIP choppy → thresholds exceeded → `show policy-map interface` → ensure LLQ for DSCP EF
  - ⚠️ DSCP markings re-marked → trust boundary wrong → `mls qos trust dscp`

### FTP and TFTP
- 📖 File transfer protocols for IOS upgrades and config backups
  - TFTP: UDP 69, no auth, no encryption, built-in ACK/retry reliability, lightweight
  - FTP: TCP 20/21, username/password, full directory operations, no encryption by default
  - FTPS = FTP + TLS | SFTP = SSH-based (completely separate protocol)
- 🔗 OSI Layer: Layer 7. TFTP=UDP 69, FTP=TCP 20/21
- ⚙️ Commands
  - `show flash` | `show version` — current image
  - `copy tftp flash` — copy IOS from TFTP
  - FTP: `ip ftp username ftpuser` → `ip ftp password ftppassword` → `copy ftp flash`
  - Backup: `copy running-config tftp`
  - Boot new: `boot system flash <filename>` → `write memory` → `reload`
- 🔧 Troubleshooting
  - ⚠️ TFTP fails → server unreachable or wrong filename → `ping <server>`
  - ⚠️ Not enough flash → `delete flash:<old-image>` → `squeeze flash:`

## 5. Security Fundamentals

### CIA Triad & Attacks
- 📖 CIA Triad
  - Confidentiality: only authorized users access data
  - Integrity: data unmodified and authentic
  - Availability: systems accessible to authorized users
  - Vulnerability → Exploit → Threat → Mitigation
- 📖 Common Attack Types
  - DoS/DDoS: SYN flood exhausts TCP connections | Botnet = distributed DoS
  - ARP Poisoning: Gratuitous ARP poisons ARP tables → MitM traffic interception
  - DHCP Starvation/Poisoning: spoofed MACs exhaust pool or install rogue server
  - Reflection/Amplification: spoofed source IP → large response floods target
  - Social Engineering: phishing, vishing, smishing, tailgating, watering hole
  - Malware: Virus (host required), Worm (self-propagating), Trojan (disguised as legit)
- ⚙️ Device Hardening
  - `service password-encryption` — Type 7 (weak but better than plaintext)
  - `enable secret SecureP@ss123` — Type 5 MD5 (always use for privileged access)
  - Disable unused interfaces: `shutdown` + add description
  - `no cdp run` / `no cdp enable` on untrusted external-facing ports
  - VTY ACL: `access-class <acl> in` on VTY lines
  - `exec-timeout 5 0` on console and VTY lines

### ACLs
- 📖 Ordered packet filter — first match wins, implicit deny any at end
  - Standard (1–99, 1300–1999): source IP only → place near DESTINATION
  - Extended (100–199, 2000–2699): src IP, dst IP, protocol, port → place near SOURCE
  - Named ACLs: easier to edit with sequence numbers
  - Wildcard mask: 0=must match, 1=ignore
- 🔗 OSI Layer: L3 (IP) and L4 (port) for extended ACLs
- 📋 Prerequisites: Specific rules first. Add explicit `permit ip any any` if needed. Extended near source
- ⚙️ Standard Named ACL
  - `ip access-list standard BLOCK_HOST` → `deny host 10.1.1.100` → `permit any`
  - Apply: `ip access-group BLOCK_HOST in`
- ⚙️ Extended Named ACL
  - `ip access-list extended POLICY_OUT`
  - `deny tcp 192.168.10.0 0.0.0.255 host 10.0.1.100 eq 443`
  - `deny icmp 192.168.0.0 0.0.255.255 10.0.0.0 0.0.255.255`
  - `permit ip any any`
  - Apply: `ip access-group POLICY_OUT out`
  - Resequence: `ip access-list resequence POLICY_OUT 10 10`
- 🔍 Verification
  - `show access-lists` — hit counters | `show ip interface <int>` — applied ACLs
- 🔧 Troubleshooting
  - ⚠️ Traffic blocked unexpectedly → wrong order → review hit counters → resequence
  - ⚠️ Broad permit hits before deny → more specific rules must come first
  - ⚠️ ACL wrong direction → `show ip interface <int>` → check in vs out

### IPsec VPN
- 📖 IPsec: encryption, authentication, integrity for IP traffic
  - Site-to-site: permanent tunnel between two gateway routers
  - Remote-access: TLS tunnel per user (Cisco AnyConnect), uses TCP 443
  - IPsec = unicast only → GRE over IPsec adds broadcast/multicast (enables OSPF over VPN)
  - DMVPN: dynamic hub-and-spoke with automatic spoke-to-spoke tunnel creation
- 🔗 OSI Layer: Layer 3 (Network)
- ⚙️ GRE Tunnel Commands
  - `interface Tunnel0` → `ip address 172.16.0.1 255.255.255.0`
  - `tunnel source GigabitEthernet0/1` → `tunnel destination 203.0.113.2`
  - OSPF over tunnel: `ip ospf network point-to-point` on both tunnel interfaces
  - ISP default route: `ip route 0.0.0.0 0.0.0.0 203.0.113.1`
- 🔍 Verification
  - `show interfaces Tunnel0` | `show crypto isakmp sa` | `show crypto ipsec sa`
- 🔧 Troubleshooting
  - ⚠️ Tunnel up but no traffic → IPsec SA not established → check pre-shared key both sides
  - ⚠️ OSPF not forming over tunnel → network type mismatch → `ip ospf network point-to-point`

### Wireless Security
- 📖 WPA Certification Levels
  - WPA1: TKIP — deprecated, avoid
  - WPA2: CCMP/AES — current standard, widely supported
  - WPA3: GCMP/AES — latest: adds SAE (replaces 4-way handshake), PMF, Forward Secrecy
  - Personal mode: PSK | Enterprise mode: 802.1X with RADIUS server
- 📖 EAP Methods
  - LEAP: deprecated (Cisco)
  - EAP-FAST: Cisco, PAC + TLS tunnel
  - PEAP: TLS tunnel + MS-CHAP, server cert only
  - EAP-TLS: most secure, certs on BOTH client and server
- 🔗 OSI Layer: Layer 2 (Data Link)
- ⚙️ WPA2 PSK (WLC GUI)
  - WLANs → Create → Security → WPA+WPA2 → AES → PSK → enter passphrase
- 🔧 Troubleshooting
  - ⚠️ Client can't connect → PSK mismatch → verify passphrase
  - ⚠️ WPA3 clients fail → firmware doesn't support WPA3 → upgrade or fall back to WPA2

### AAA
- 📖 Framework for access control
  - Authentication: verify identity
  - Authorization: grant permissions
  - Accounting: log activity
  - TACACS+ (Cisco): TCP 49, separates AAA, used for device administration via SSH
  - RADIUS (open standard): UDP 1812/1813, combines auth+authz, used for 802.1X/VPN/network access
  - Cisco ISE = AAA server solution
- 🔗 OSI Layer: Layer 7 (Application)
- 📋 Prerequisites: AAA server reachable. Shared secret matches. ALWAYS configure fallback local auth
- ⚙️ TACACS+ Commands
  - `aaa new-model`
  - `tacacs server ISE` → `address ipv4 10.1.1.200` → `key TacKey`
  - `aaa authentication login default group tacacs+ local`
  - `aaa authorization exec default group tacacs+ local`
  - `aaa accounting exec default start-stop group tacacs+`
- 🔍 Verification
  - `show aaa servers` | `test aaa group tacacs+ admin password legacy`
- 🔧 Troubleshooting
  - ⚠️ Auth failing → shared secret wrong or server unreachable → `show aaa servers`
  - ⚠️ Locked out → use console (AAA typically doesn't apply) → `aaa authentication login console local`

## 6. Automation and Programmability

### SDN & Network Planes
- 📖 Three Logical Planes
  - Data Plane: forwards user traffic — handled by ASICs + TCAM at wire speed (NOT CPU)
  - Control Plane: builds routing/MAC/ARP/STP tables — CPU processed
  - Management Plane: SSH, SNMP, Syslog, NTP — device management traffic
- 📖 SDN Architecture
  - Centralizes Control Plane into a software controller
  - Southbound Interface (SBI): controller → devices (NETCONF, RESTCONF, OpenFlow, OpFlex)
  - Northbound Interface (NBI): apps/scripts → controller (REST API)
  - Cisco SD-Access: DNA Center + IS-IS underlay + VXLAN/LISP overlay
  - SD-Access node roles: Edge (end hosts), Border (WAN/external), Control (LISP mapping)
- 🔗 OSI Layer: All layers
- ⚙️ Enable RESTCONF [IOS-XE]
  - `ip http secure-server` → `restconf` → `netconf-yang`
- 🔍 Verification
  - `show netconf-yang status` | DNA Center: Design → Provision → Assurance
- 🔧 Troubleshooting
  - ⚠️ Device not in DNA Center → discovery failed → check SNMP community + SSH credentials
  - ⚠️ NETCONF failing → not enabled → `netconf-yang` in global config

### REST APIs
- 📖 Representational State Transfer
  - Six constraints: stateless, client-server, cacheable, uniform interface, layered, code-on-demand
  - CRUD → HTTP: Create=POST, Read=GET, Update=PUT/PATCH, Delete=DELETE
  - Data format: JSON (most common) or XML
  - Auth: Basic, Bearer Token, OAuth
- 📖 HTTP Status Codes
  - 200=OK, 201=Created, 400=Bad Request, 401=Unauthorized, 403=Forbidden, 404=Not Found, 500=Server Error
- 🔗 OSI Layer: Layer 7 (Application), HTTPS TCP 443
- 🔧 Troubleshooting
  - ⚠️ 401 Unauthorized → wrong credentials or expired token → re-authenticate
  - ⚠️ 404 Not Found → wrong URI or wrong API version → check documentation

### JSON, XML, and YAML
- 📖 JSON (JavaScript Object Notation)
  - Key-value pairs in `{}` objects and `[]` arrays
  - Types: string (quoted), number, boolean (true/false), null
  - Whitespace insignificant | Used by REST APIs
- 📖 YAML (YAML Ain't Markup Language)
  - Most human-readable serialization format
  - Indentation significant (spaces only, no tabs!)
  - Starts with `---` | Lists use `-` | `key: value` pairs
  - Used by Ansible playbooks and inventories
- 📖 XML (Extensible Markup Language)
  - `<key>value</key>` format | Less human-readable | Used by NETCONF
- 🔧 Troubleshooting
  - ⚠️ JSON parse error → trailing comma or unquoted string → validate at jsonlint.com
  - ⚠️ YAML error → tabs instead of spaces → convert all indentation to spaces

### Ansible, Puppet, and Chef
- 📖 Configuration Management — fight config drift at scale
- 📖 Ansible (Red Hat)
  - Agentless, push model, uses SSH, written in Python
  - Files: Playbooks (YAML), Inventory (INI/YAML), Templates (Jinja2), Variables (YAML)
- 📖 Puppet
  - Agent-based (or agentless proxy), pull model, TCP 8140
  - Files: Manifests (desired state), Templates (generate manifests)
- 📖 Chef
  - Agent-based, pull model, TCP 10002
  - Files: Resources → Recipes → Cookbooks → Run-List, Ruby DSL
- 📖 Quick Comparison (memorize)
  - Ansible: agentless + push model + SSH
  - Puppet: agent-based + pull model + TCP 8140
  - Chef: agent-based + pull model + TCP 10002
- 🔧 Troubleshooting
  - ⚠️ Ansible SSH auth failing → add device to known_hosts or disable StrictHostKeyChecking
  - ⚠️ Config drift → `ansible-playbook --diff` to detect differences → push correct state

### Traditional vs Controller-Based Networking
- 📖 Traditional Networks
  - Engineers SSH to each device individually — slow and error-prone
  - Per-device configuration, no central compliance enforcement
- 📖 Controller-Based (SDN)
  - DNA Center centrally manages all devices
  - Intent-based: describe what you want, controller handles how
  - Centrally managed: software versions, policies, configs, zero-touch provisioning
- 📖 Key Architecture Concepts
  - ASIC + TCAM: wire-speed forwarding without CPU
  - Underlay: physical IS-IS routed network (all L3 links, no STP)
  - Overlay: virtual VXLAN network on top of underlay
  - Fabric: underlay + overlay combined
- 🔧 Troubleshooting
  - ⚠️ DNA Center shows device unreachable → wrong SNMP community or SSH credentials
  - ⚠️ Policy not applying → provisioning failed → check DNA Center workflow logs

## 7. Network Best Practices

### Switch Setup Checklist
- 📖 Ordered sequence — apply top-to-bottom on every managed switch
- 🔗 Scope: All IOS/IOS-XE Layer 2 and multilayer switches
- ⚙️ Step 1 — Identity & Management
  - `hostname SW1`
  - `ip domain-name company.local`
  - `no ip domain-lookup`
  - `banner motd ^Authorized access only. Activity is monitored and logged.^`
  - Management VLAN (use a dedicated VLAN, NOT VLAN 1):
    - `interface vlan 99` → `ip address 10.0.99.2 255.255.255.0` → `no shutdown`
    - `ip default-gateway 10.0.99.1`
- ⚙️ Step 2 — Local Authentication (use AAA in production — see AAA node)
  - `enable secret <strong-password>` — never use `enable password`
  - `service password-encryption`
  - `username admin privilege 15 secret <strong-password>`
  - `username netops privilege 7 secret <strong-password>`
  - `username readonly privilege 1 secret <strong-password>`
- ⚙️ Step 3 — SSH Only (disable Telnet — see SSH node)
  - `crypto key generate rsa modulus 2048`
  - `ip ssh version 2`
  - `line vty 0 15` → `login local` → `transport input ssh` → `exec-timeout 5 0`
  - `line console 0` → `login local` → `exec-timeout 5 0` → `logging synchronous`
  - VTY ACL: `ip access-list standard MGMT_ACCESS` → `permit 10.0.0.0 0.0.0.255` → apply: `access-class MGMT_ACCESS in`
- ⚙️ Step 4 — VLAN Hardening
  - Change native VLAN from VLAN 1: `switchport trunk native vlan 999`
  - Create VLAN 999 as unused/blackhole: `vlan 999` → `name BLACKHOLE`
  - All unused ports: `shutdown` + `switchport access vlan 999`
  - Disable DTP on all trunk ports: `switchport nonegotiate`
  - VTP: `vtp mode transparent` (or `off`) to prevent VTP domain poisoning
- ⚙️ Step 5 — STP Hardening (see STP node)
  - `spanning-tree mode rapid-pvst`
  - Manually elect root: `spanning-tree vlan <id> root primary` on distribution/core
  - All access ports: `spanning-tree portfast` + `spanning-tree bpduguard enable`
  - Global fallback: `spanning-tree portfast default` + `spanning-tree portfast bpduguard default`
- ⚙️ Step 6 — L2 Attack Mitigation (details in respective nodes)
  - Port Security on access ports → see Port Security node
  - DHCP Snooping → see DHCP Snooping node
  - Dynamic ARP Inspection (DAI) → see DAI node
  - Storm Control: `storm-control broadcast level 20.00` on access ports
  - IP Source Guard: `ip verify source` on access ports (requires DHCP Snooping binding table)
- ⚙️ Step 7 — Monitoring
  - NTP: `ntp server <ip> prefer` → see NTP node
  - Syslog: `logging <server-ip>` → `logging trap informational` → see Syslog node
  - SNMP: use SNMPv3 only → see SNMP node
  - `service timestamps log datetime msec localtime show-timezone`
- 🔍 Verification
  - `show run` — full config review
  - `show interfaces status` — all ports and assigned VLANs
  - `show spanning-tree summary` — STP mode, root, PortFast/BPDU Guard
  - `show port-security` | `show ip dhcp snooping` | `show ip arp inspection`
  - `show users` — active sessions
- 🔧 Common Mistakes
  - ⚠️ Management on VLAN 1 → move SVI to dedicated VLAN + update `ip default-gateway`
  - ⚠️ DTP left enabled → attacker can negotiate trunk → `switchport nonegotiate` on ALL trunk ports
  - ⚠️ Native VLAN = VLAN 1 → VLAN hopping possible → change to unused VLAN on BOTH ends
  - ⚠️ Unused ports not shut down → rogue device connection → shutdown + blackhole VLAN

### Router Setup Checklist
- 📖 Ordered sequence — apply top-to-bottom on every managed router
- 🔗 Scope: All IOS/IOS-XE routers (edge, core, WAN)
- ⚙️ Step 1 — Identity & Management
  - `hostname R1`
  - `ip domain-name company.local`
  - `no ip domain-lookup`
  - `banner motd ^Authorized access only. Activity is monitored and logged.^`
- ⚙️ Step 2 — Local Authentication (use AAA in production — see AAA node)
  - `enable secret <strong-password>` — never use `enable password`
  - `service password-encryption`
  - `username admin privilege 15 secret <strong-password>`
  - `username netops privilege 7 secret <strong-password>`
- ⚙️ Step 3 — SSH Only (disable Telnet — see SSH node)
  - `crypto key generate rsa modulus 2048`
  - `ip ssh version 2`
  - `line vty 0 15` → `login local` → `transport input ssh` → `exec-timeout 5 0`
  - `line console 0` → `login local` → `exec-timeout 5 0` → `logging synchronous`
  - VTY ACL: restrict to management subnet only → `access-class MGMT_ACCESS in`
- ⚙️ Step 4 — Disable Unused Services
  - `no ip http server` | `no ip http secure-server` (unless needed)
  - `no cdp run` on WAN/external interfaces: `no cdp enable`
  - `no ip finger` | `no service tcp-small-servers` | `no service udp-small-servers`
  - `no ip bootp server` | `no ip source-route`
- ⚙️ Step 5 — Routing
  - Configure routing protocol (OSPF/EIGRP) → see respective nodes
  - `passive-interface default` → then `no passive-interface <routing-facing-int>` (OSPF/EIGRP)
  - Default route toward ISP: `ip route 0.0.0.0 0.0.0.0 <ISP-next-hop>`
- ⚙️ Step 6 — NAT / DHCP
  - PAT on WAN interface: `ip nat inside source list <acl> interface <WAN-int> overload` → see NAT node
  - DHCP pools per subnet or `ip helper-address` toward central DHCP server → see DHCP node
- ⚙️ Step 7 — L3/L4 Security (details in Security Best Practices node)
  - Anti-spoofing ACL inbound on WAN interface
  - uRPF on WAN interface: `ip verify unicast source reachable-via rx`
  - CoPP to protect router CPU from floods
- ⚙️ Step 8 — Monitoring
  - NTP: `ntp server <ip> prefer` → see NTP node
  - Syslog: `logging <server-ip>` → `logging trap informational` → see Syslog node
  - SNMP: SNMPv3 only → see SNMP node
  - `service timestamps log datetime msec localtime show-timezone`
- 🔍 Verification
  - `show run` — full config review
  - `show ip interface brief` — all interfaces
  - `show ip route` — routing table including default route
  - `show users` — active VTY sessions
  - `show ip nat translations` | `show ip dhcp binding`
- 🔧 Common Mistakes
  - ⚠️ No `passive-interface` on LAN-facing interfaces → routing hellos sent to end hosts → enable passive
  - ⚠️ `enable password` used instead of `enable secret` → MD5 not applied → use `enable secret`
  - ⚠️ HTTP server left enabled → exposes web GUI → `no ip http server`
  - ⚠️ CDP left on WAN interfaces → reveals IOS version and platform to ISP/attacker → `no cdp enable`

### Access Control & Privilege Levels
- 📖 IOS has 16 privilege levels (0–15)
  - Level 1 = User EXEC (default after login) — `show` commands only, no config
  - Level 15 = Privileged EXEC (after `enable`) — full access including `configure terminal`
  - Levels 2–14 = Custom (assign specific commands to any level)
  - Best practice: never give users direct Level 15 — use AAA + TACACS+ for granular control
- 🔗 Scope: All IOS/IOS-XE devices
- ⚙️ MOTD Banner (legal warning — not a welcome message)
  - `banner motd ^`
  - `Authorized users only. Unauthorized access is prohibited.`
  - `All activity is monitored and recorded. Disconnect immediately if not authorized.`
  - `^`
  - Use delimiter that doesn't appear in text (common: `#`, `^`, `$`)
  - Also configure: `banner login ^Enter credentials to proceed^`
- ⚙️ Disable Telnet, enforce SSH
  - `line vty 0 15` → `transport input ssh` → `login local`
  - Verify no Telnet: `show line vty 0` → Transport Input should show `ssh` only
- ⚙️ Local User Privilege Levels
  - Full admin: `username admin privilege 15 secret Admin@Pass1`
  - NOC / read-mostly: `username netops privilege 7 secret Netops@Pass1`
  - Read-only: `username readonly privilege 1 secret Readonly@Pass1`
- ⚙️ Custom Privilege Level (e.g. Level 7 = NOC with extended show access)
  - `privilege exec level 7 show running-config`
  - `privilege exec level 7 show ip route`
  - `privilege exec level 7 show interfaces`
  - `privilege exec level 7 ping`
  - `privilege exec level 7 traceroute`
  - `enable secret level 7 Noc@Level7Pass` — password to enter level 7
  - NOC logs in → gets Level 7 automatically (via `username netops privilege 7`)
- ⚙️ Console line hardening
  - `line console 0` → `login local` → `exec-timeout 5 0` → `logging synchronous`
  - `privilege level 15` on console only if physically secured
- ⚙️ VTY line hardening
  - `line vty 0 15` → `login local` → `transport input ssh` → `exec-timeout 5 0`
  - `access-class MGMT_ACCESS in` — only allow SSH from management subnet
- 🔍 Verification
  - `show privilege` — current privilege level of active session
  - `show run | section line vty` — verify transport input and access-class
  - `show users` — all active sessions and their privilege levels
  - `show run | include username` — all local user accounts
- 🔧 Common Mistakes
  - ⚠️ All users given privilege 15 → no separation of duties → create tiered accounts
  - ⚠️ `transport input all` on VTY → Telnet still allowed → change to `transport input ssh`
  - ⚠️ No `exec-timeout` → idle session stays open indefinitely → set `exec-timeout 5 0`
  - ⚠️ Banner says "Welcome" → legally could imply consent to access → use authorized-only language

### Layer 2 Security on Switch
- 📖 Defense-in-depth at Layer 2 — stop attacks before they reach Layer 3
  - VLAN hopping, MAC flooding, ARP poisoning, DHCP starvation/spoofing are all L2 attacks
  - Enable in this order: Port Security → DHCP Snooping → DAI → IP Source Guard
- 🔗 Scope: All access-layer switches
- ⚙️ VLAN Hopping Prevention
  - Change native VLAN from VLAN 1: `switchport trunk native vlan 999`
  - Tag native VLAN explicitly (optional, adds double-tag protection): `vlan dot1q tag native`
  - Disable DTP on all trunks: `switchport nonegotiate`
  - Shutdown + blackhole all unused ports: `shutdown` + `switchport access vlan 999`
- ⚙️ MAC Flooding Prevention
  - Port Security on all access ports → see Port Security node
  - `switchport port-security maximum 3` — limit MACs per port
  - `switchport port-security violation restrict` — drop + log (avoid shutdown in production)
- ⚙️ DHCP Starvation / Rogue DHCP Prevention
  - DHCP Snooping → see DHCP Snooping node
  - Key: mark ONLY uplinks as trusted, all host ports untrusted
- ⚙️ ARP Poisoning / MitM Prevention
  - DAI (Dynamic ARP Inspection) → see DAI node
  - Requires DHCP Snooping binding table to be populated first
  - For static IP hosts: create ARP ACL → `arp access-list STATIC_HOSTS`
- ⚙️ IP Spoofing Prevention at Layer 2
  - IP Source Guard: `ip verify source` on access ports
  - Binds learned IP + MAC + port from DHCP Snooping table
  - Drops packets whose source IP doesn't match the binding
  - For static IP hosts: manually bind → `ip source binding <MAC> vlan <id> <IP> interface <int>`
- ⚙️ Broadcast Storm Prevention
  - `storm-control broadcast level 20.00` — drop broadcasts exceeding 20% of bandwidth
  - `storm-control multicast level 20.00`
  - `storm-control action shutdown` — err-disable port if threshold exceeded
- ⚙️ STP Attack Prevention (BPDU Guard, Root Guard)
  - PortFast + BPDU Guard on all access ports → see STP node
  - Root Guard on ports that should never become root: `spanning-tree guard root`
    - Apply on distribution-to-access uplinks to prevent rogue root bridge
  - Loop Guard on non-designated ports: `spanning-tree guard loop`
- 🔍 Verification
  - `show ip dhcp snooping binding` — learned IP/MAC/VLAN/port bindings
  - `show ip arp inspection statistics` — ARP inspection drops per VLAN
  - `show ip verify source` — IP Source Guard bindings
  - `show storm-control` — current thresholds and action
  - `show spanning-tree detail` — Root Guard, Loop Guard status
- 🔧 Common Mistakes
  - ⚠️ DHCP Snooping not enabled before DAI → no binding table → DAI drops ALL ARP → enable Snooping first
  - ⚠️ IP Source Guard on port with static IP host → drops legitimate traffic → add manual binding
  - ⚠️ Root Guard on wrong ports → legitimate topology change blocked → only apply on access-facing uplinks
  - ⚠️ Storm control too aggressive (level < 5%) → legitimate multicast dropped → tune per traffic profile

### Layer 3 / Layer 4 Security on Router
- 📖 Defense-in-depth at Layer 3/4 — protect routing infrastructure and block spoofed/malicious traffic
  - Anti-spoofing, bogon filtering, uRPF, CoPP are industry-standard edge router hardening
- 🔗 Scope: Edge routers, WAN-facing interfaces, distribution routers
- ⚙️ Anti-Spoofing ACL (inbound on WAN/external interface)
  - Block RFC 1918 addresses arriving from internet (they should never come from outside)
  - `ip access-list extended ANTI_SPOOF_IN`
  - `deny ip 10.0.0.0 0.255.255.255 any log`
  - `deny ip 172.16.0.0 0.15.255.255 any log`
  - `deny ip 192.168.0.0 0.0.255.255 any log`
  - `deny ip 127.0.0.0 0.255.255.255 any log`
  - `deny ip 169.254.0.0 0.0.255.255 any log`
  - `deny ip 0.0.0.0 0.255.255.255 any log`
  - `permit ip any any`
  - Apply inbound on WAN: `interface GigabitEthernet0/1` → `ip access-group ANTI_SPOOF_IN in`
  - Full ACL best practices → see ACLs node
- ⚙️ uRPF — Unicast Reverse Path Forwarding
  - Drops packets whose source IP is not reachable via the interface it arrived on
  - Strict mode (single-homed): `ip verify unicast source reachable-via rx`
  - Loose mode (multi-homed/asymmetric): `ip verify unicast source reachable-via any`
  - Apply on WAN-facing interface: `interface GigabitEthernet0/1` → `ip verify unicast source reachable-via rx`
  - Requires CEF: `ip cef` (default on IOS)
- ⚙️ DHCP Attack Prevention at Router
  - DHCP Snooping on distribution switch (L2) → see DHCP Snooping node
  - `ip dhcp relay information trust-all` on relay router if Option 82 causes relay drops
  - Rate-limit DHCP: `ip dhcp limit lease per-interface <n>` — caps leases per sub-interface
- ⚙️ ARP Spoofing at Layer 3
  - DAI handles ARP validation at L2 on switch → see DAI node
  - On router: static ARP entries for critical hosts → `arp 192.168.1.1 aabb.cc00.1234 arpa`
- ⚙️ SYN Flood / TCP Attack Mitigation
  - TCP Intercept (older IOS — intercept mode): `ip tcp intercept list OUTSIDE_TCP`
    - `ip access-list extended OUTSIDE_TCP` → `permit tcp any 192.168.0.0 0.0.255.255`
    - `ip tcp intercept mode intercept` — router proxies TCP handshake, only forwards completed connections
  - Watch mode (lighter): `ip tcp intercept mode watch` — monitors and resets incomplete connections
- ⚙️ Control Plane Policing (CoPP)
  - Protects the router CPU from floods targeting the control plane (OSPF, BGP, SSH, ICMP)
  - `class-map match-any CP_ICMP` → `match protocol icmp`
  - `class-map match-any CP_ROUTING` → `match protocol ospf` | `match protocol eigrp`
  - `policy-map COPP_POLICY`
  - `class CP_ICMP` → `police rate 512 kbps conform transmit exceed drop`
  - `class CP_ROUTING` → `police rate 1000 kbps conform transmit exceed drop`
  - Apply: `control-plane` → `service-policy input COPP_POLICY`
- ⚙️ ICMP / Directed Broadcast
  - Disable IP directed broadcasts (Smurf amplification): `no ip directed-broadcast` (default off IOS 12.x+)
  - Rate-limit ICMP on WAN interface: `rate-limit input access-group 101 8000 1500 2000 conform-action transmit exceed-action drop`
- ⚙️ Routing Protocol Security
  - OSPF MD5 auth: `ip ospf message-digest-key 1 md5 <key>` + `ip ospf authentication message-digest`
  - EIGRP MD5 auth: `ip authentication mode eigrp 100 md5` + `ip authentication key-chain eigrp 100 <chain>`
  - Passive interfaces: `passive-interface default` → `no passive-interface <routing-int>` — see OSPF/EIGRP nodes
- 🔍 Verification
  - `show ip access-lists ANTI_SPOOF_IN` — hit counts on deny rules (confirms drops)
  - `show ip verify unicast` — uRPF drop counters per interface
  - `show ip tcp intercept` — intercepted and established sessions
  - `show policy-map control-plane` — CoPP hit counters per class
  - `show ip ospf neighbor` — confirm no unexpected neighbors (rogue router)
- 🔧 Common Mistakes
  - ⚠️ uRPF strict on asymmetric path → drops legitimate return traffic → use loose mode for multi-homed
  - ⚠️ Anti-spoofing ACL applied outbound instead of inbound → spoofed packets processed before drop → always apply inbound on untrusted interface
  - ⚠️ CoPP too aggressive → legitimate routing protocol packets dropped → tune rates per protocol with `show policy-map control-plane`
  - ⚠️ OSPF/EIGRP no authentication → rogue router can inject false routes → always enable MD5 auth in production
